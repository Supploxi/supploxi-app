<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supploxi — PO Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .status-steps { display:flex; margin-bottom:32px; }
    .status-step { flex:1; display:flex; flex-direction:column; align-items:center; position:relative; }
    .status-step-dot { width:32px; height:32px; border-radius:50%; border:2px solid var(--border); background:var(--bg-hover); display:flex; align-items:center; justify-content:center; font-size:12px; z-index:1; }
    .status-step.done .status-step-dot { background:var(--green); border-color:var(--green); color:#000; }
    .status-step.active .status-step-dot { background:var(--green); border-color:var(--green); color:#000; box-shadow:0 0 0 4px var(--green-dim); }
    .status-step-label { font-size:11px; color:var(--text-muted); margin-top:6px; text-align:center; }
    .status-step.active .status-step-label { color:var(--green); font-weight:600; }
    .status-step-line { position:absolute; top:16px; left:50%; width:100%; height:2px; background:var(--border); z-index:0; }
    .status-step.done .status-step-line { background:var(--green); }
    .status-step:last-child .status-step-line { display:none; }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="page-content">
      <div id="po-content">
        <div class="empty-state"><div class="spinner"></div><p style="margin-top:12px">Loading...</p></div>
      </div>
    </div>
  </div>

  <!-- ADD ITEM MODAL -->
  <div class="modal-overlay" id="item-modal">
    <div class="modal" style="max-width:500px">
      <div class="modal-header">
        <span class="modal-title">Add Item to PO</span>
        <button class="modal-close" onclick="closeItemModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Product</label>
          <select id="item-product" class="form-select" onchange="fillProductPrice()">
            <option value="">Select product or type manually...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Product Name <span class="required">*</span></label>
          <input type="text" id="item-name" class="form-input" placeholder="Product name">
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">SKU</label>
            <input type="text" id="item-sku" class="form-input" placeholder="SKU-001">
          </div>
          <div class="form-group">
            <label class="form-label">Quantity <span class="required">*</span></label>
            <input type="number" id="item-qty" class="form-input" placeholder="100" oninput="calcItemTotal()">
          </div>
          <div class="form-group">
            <label class="form-label">Unit Price (USD) <span class="required">*</span></label>
            <input type="number" id="item-price" class="form-input" placeholder="8.50" step="0.01" oninput="calcItemTotal()">
          </div>
          <div class="form-group">
            <label class="form-label">Total</label>
            <div class="computed-field" id="item-total" style="background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-weight:600">$0.00</div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <input type="text" id="item-notes" class="form-input" placeholder="Color, size, specifications...">
        </div>
        <div class="form-error" id="item-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeItemModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addItem()">Add Item</button>
      </div>
    </div>
  </div>

  <!-- PAYMENT MODAL -->
  <div class="modal-overlay" id="payment-modal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <span class="modal-title">Record Payment</span>
        <button class="modal-close" onclick="closePaymentModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Amount Paid (USD)</label>
          <input type="number" id="pay-amount" class="form-input" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label">Payment Date</label>
          <input type="date" id="pay-date" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <input type="text" id="pay-notes" class="form-input" placeholder="Wire transfer, reference #...">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closePaymentModal()">Cancel</button>
        <button class="btn btn-primary" onclick="recordPayment()">Record Payment</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/business-logic.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    const poId = new URLSearchParams(location.search).get('id')
    let po = null, items = [], products = []

    const STATUS_STEPS = ['draft','sent','confirmed','in_production','shipped','received']
    const STATUS_LABELS = { draft:'Draft', sent:'Sent to Supplier', confirmed:'Confirmed', in_production:'In Production', shipped:'Shipped', received:'Received' }

    async function load() {
      const user = await window.requireAuth()
      await window.initLayout({ page: 'purchase-orders', title: 'Purchase Order' })
      if (!poId) { window.location.href = '/purchase-orders.html'; return }

      const [{ data: p }, { data: it }, { data: pr }] = await Promise.all([
        window._sb.from('purchase_orders').select('*, suppliers(company_name, lead_time_days)').eq('id', poId).eq('user_id', user.id).single(),
        window._sb.from('po_items').select('*').eq('po_id', poId),
        window._sb.from('products').select('id,name,sku,cost_price').eq('user_id', user.id)
      ])
      if (!p) { window.location.href = '/purchase-orders.html'; return }
      po = p; items = it || []; products = pr || []

      const sel = document.getElementById('item-product')
      sel.innerHTML = '<option value="">Select product...</option>' + products.map(p => `<option value="${p.id}" data-name="${window.escapeHtml(p.name)}" data-sku="${p.sku||''}" data-price="${p.cost_price||0}">${window.escapeHtml(p.name)}</option>`).join('')

      document.getElementById('pay-date').value = new Date().toISOString().split('T')[0]

      render()
    }

    function render() {
      const stepIdx = STATUS_STEPS.indexOf(po.status)
      const totalPaid = po.amount_paid || 0
      const totalVal = po.total_value || 0
      const remaining = totalVal - totalPaid

      const stepsHtml = STATUS_STEPS.map((s, i) => `
        <div class="status-step ${i < stepIdx ? 'done' : i === stepIdx ? 'active' : ''}">
          <div class="status-step-line"></div>
          <div class="status-step-dot">${i < stepIdx ? '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l4 4 6-7"/></svg>' : i + 1}</div>
          <div class="status-step-label">${STATUS_LABELS[s]}</div>
        </div>`).join('')

      const nextStatuses = STATUS_STEPS.slice(stepIdx + 1).filter(s => s !== 'cancelled')
      const nextBtns = nextStatuses.slice(0,1).map(s =>
        `<button class="btn btn-primary" onclick="updateStatus('${s}')">Mark as ${STATUS_LABELS[s]} →</button>`
      ).join('')

      document.getElementById('po-content').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
          <div>
            <div style="display:flex;align-items:center;gap:12px">
              <h1 style="font-size:22px;font-weight:700">${po.po_number}</h1>
              ${window.getStatusBadge(po.status)}
              ${window.getStatusBadge(po.payment_status||'pending')}
            </div>
            <div style="color:var(--text-muted);font-size:14px;margin-top:4px">
              ${window.escapeHtml(po.suppliers?.company_name||'—')} · Created ${window.formatDate(po.created_at)}
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary" onclick="window.location.href='/purchase-orders.html'">← Back</button>
            ${po.status !== 'cancelled' && po.status !== 'received' ? `<button class="btn btn-secondary" onclick="updateStatus('cancelled')">Cancel PO</button>` : ''}
            ${nextBtns}
          </div>
        </div>

        <!-- PROGRESS -->
        <div class="card" style="margin-bottom:24px">
          <div class="status-steps">${stepsHtml}</div>
          <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
            <div class="stat-card"><div class="stat-label">Total Value</div><div class="stat-value" style="font-size:22px">${window.formatCurrency(totalVal)}</div></div>
            <div class="stat-card"><div class="stat-label">Amount Paid</div><div class="stat-value" style="font-size:22px;color:var(--green)">${window.formatCurrency(totalPaid)}</div></div>
            <div class="stat-card"><div class="stat-label">Remaining</div><div class="stat-value" style="font-size:22px;color:${remaining>0?'var(--orange)':'var(--green)'}">${window.formatCurrency(remaining)}</div></div>
            <div class="stat-card"><div class="stat-label">Expected Delivery</div><div class="stat-value" style="font-size:16px;padding-top:8px">${window.formatDate(po.expected_delivery)}</div></div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 320px;gap:24px">
          <div>
            <!-- ITEMS -->
            <div class="table-container" style="margin-bottom:24px">
              <div class="table-header" style="justify-content:space-between">
                <span style="font-weight:600">Order Items (${items.length})</span>
                ${po.status !== 'received' && po.status !== 'cancelled' ? `<button class="btn btn-sm btn-primary" onclick="openItemModal()">+ Add Item</button>` : ''}
              </div>
              ${items.length ? `
                <table>
                  <thead><tr><th>Product</th><th>SKU</th><th>Ordered</th><th>Received</th><th>Unit Price</th><th>Total</th><th></th></tr></thead>
                  <tbody>
                    ${items.map(it => `<tr>
                      <td><strong>${window.escapeHtml(it.product_name)}</strong>${it.notes?`<div style="font-size:11px;color:var(--text-muted)">${window.escapeHtml(it.notes)}</div>`:''}</td>
                      <td style="color:var(--text-muted)">${it.sku||'—'}</td>
                      <td>${it.quantity}</td>
                      <td style="color:${it.quantity_received>=it.quantity?'var(--green)':'var(--text-muted)'}">${it.quantity_received||0}</td>
                      <td>${window.formatCurrency(it.unit_price)}</td>
                      <td><strong>${window.formatCurrency(it.total_price||it.quantity*it.unit_price)}</strong></td>
                      <td><button class="btn btn-sm btn-danger btn-icon" onclick="deleteItem('${it.id}')" title="Delete"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4h12"/><path d="M5.5 4V2.5h5V4"/><path d="M3.5 4l.5 9.5a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1L12.5 4"/></svg></button></td>
                    </tr>`).join('')}
                    <tr style="background:rgba(0,0,0,0.2)">
                      <td colspan="5" style="text-align:right;font-weight:600;padding:14px 16px">Total</td>
                      <td colspan="2"><strong style="font-size:16px;color:var(--green)">${window.formatCurrency(items.reduce((a,i)=>a+(i.total_price||i.quantity*i.unit_price),0))}</strong></td>
                    </tr>
                  </tbody>
                </table>` : `<div class="empty-state" style="padding:30px"><p>No items yet. Add products to this PO.</p></div>`}
            </div>

            <!-- LINKED SHIPMENTS -->
            <div id="linked-shipments"></div>
          </div>

          <!-- SIDEBAR INFO -->
          <div>
            <div class="card" style="margin-bottom:16px">
              <div class="card-title" style="margin-bottom:16px">Order Details</div>
              <div style="display:flex;flex-direction:column;gap:10px;font-size:13px">
                <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Supplier</span><strong>${window.escapeHtml(po.suppliers?.company_name||'—')}</strong></div>
                <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Order Date</span><span>${window.formatDate(po.order_date)}</span></div>
                <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Payment Terms</span><span>${po.payment_terms||'—'}</span></div>
                <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Shipping</span><span>${po.shipping_method||'—'}</span></div>
              </div>
              ${po.notes ? `<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px;font-size:13px;color:var(--text-muted)">${window.escapeHtml(po.notes)}</div>` : ''}
            </div>

            <div class="card">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
                <span class="card-title">Payments</span>
                <button class="btn btn-sm btn-secondary" onclick="openPaymentModal()">+ Record</button>
              </div>
              <div style="display:flex;flex-direction:column;gap:8px">
                <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text-muted)">Order Total</span><strong>${window.formatCurrency(totalVal)}</strong></div>
                <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text-muted)">Paid</span><strong style="color:var(--green)">${window.formatCurrency(totalPaid)}</strong></div>
                <div style="height:1px;background:var(--border);margin:4px 0"></div>
                <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text-muted)">Remaining</span><strong style="color:${remaining>0?'var(--orange)':'var(--green)'}">${window.formatCurrency(remaining)}</strong></div>
              </div>
            </div>
          </div>
        </div>`

      loadLinkedShipments()
    }

    async function loadLinkedShipments() {
      const { data } = await window._sb.from('shipments').select('*').eq('po_id', poId)
      const el = document.getElementById('linked-shipments')
      if (!el) return
      el.innerHTML = `
        <div class="table-container">
          <div class="table-header" style="justify-content:space-between">
            <span style="font-weight:600">Linked Shipments</span>
            <a href="/shipments.html?po=${poId}" class="btn btn-sm btn-secondary">+ Add Shipment</a>
          </div>
          ${data?.length ? `<table>
            <thead><tr><th>Tracking #</th><th>Status</th><th>ETA</th><th>Days</th></tr></thead>
            <tbody>${data.map(s=>`<tr onclick="window.location.href='/shipment-detail.html?id=${s.id}'">
              <td><strong>${window.escapeHtml(s.tracking_number)}</strong></td>
              <td>${window.getStatusBadge(s.status)}</td>
              <td>${window.formatDate(s.estimated_arrival)}</td>
              <td>${s.days_in_transit||0}d</td>
            </tr>`).join('')}</tbody>
          </table>` : `<div class="empty-state" style="padding:24px"><p>No shipments linked to this PO</p></div>`}
        </div>`
    }

    async function updateStatus(newStatus) {
      const { error } = await window._sb.from('purchase_orders').update({ status: newStatus }).eq('id', poId)
      if (error) { window.showToast('Error: ' + error.message, 'error'); return }
      po.status = newStatus
      window.showToast(`Status updated to ${newStatus.replace('_',' ')}`, 'success')
      render()
    }

    function openItemModal() { document.getElementById('item-modal').classList.add('active') }
    function closeItemModal() { document.getElementById('item-modal').classList.remove('active') }
    function openPaymentModal() { document.getElementById('payment-modal').classList.add('active') }
    function closePaymentModal() { document.getElementById('payment-modal').classList.remove('active') }

    function fillProductPrice() {
      const sel = document.getElementById('item-product')
      const opt = sel.options[sel.selectedIndex]
      if (!opt.value) return
      document.getElementById('item-name').value = opt.dataset.name || ''
      document.getElementById('item-sku').value = opt.dataset.sku || ''
      document.getElementById('item-price').value = opt.dataset.price || ''
      calcItemTotal()
    }

    function calcItemTotal() {
      const qty = parseFloat(document.getElementById('item-qty').value) || 0
      const price = parseFloat(document.getElementById('item-price').value) || 0
      document.getElementById('item-total').textContent = window.formatCurrency(qty * price)
    }

    async function addItem() {
      const name = document.getElementById('item-name').value.trim()
      const qty = parseInt(document.getElementById('item-qty').value)
      const price = parseFloat(document.getElementById('item-price').value)
      if (!name) { document.getElementById('item-error').textContent = 'Product name required.'; return }
      if (!qty || qty < 1) { document.getElementById('item-error').textContent = 'Quantity must be at least 1.'; return }
      if (!price || price < 0) { document.getElementById('item-error').textContent = 'Valid price required.'; return }
      const productId = document.getElementById('item-product').value || null
      const { error } = await window._sb.from('po_items').insert({
        po_id: poId, product_id: productId,
        product_name: name, sku: document.getElementById('item-sku').value.trim(),
        quantity: qty, unit_price: price, total_price: qty * price,
        notes: document.getElementById('item-notes').value.trim()
      })
      if (error) { document.getElementById('item-error').textContent = error.message; return }
      // Atualiza total do PO
      const newTotal = items.reduce((a,i) => a+(i.total_price||0), 0) + (qty * price)
      await window._sb.from('purchase_orders').update({ total_value: newTotal }).eq('id', poId)
      po.total_value = newTotal
      window.showToast('Item added!', 'success')
      closeItemModal()
      const { data } = await window._sb.from('po_items').select('*').eq('po_id', poId)
      items = data || []
      render()
    }

    async function deleteItem(itemId) {
      const it = items.find(i => i.id === itemId)
      if (!it) return
      const { error } = await window._sb.from('po_items').delete().eq('id', itemId)
      if (error) { window.showToast('Error: ' + error.message, 'error'); return }
      const newTotal = Math.max(0, (po.total_value||0) - (it.total_price||0))
      await window._sb.from('purchase_orders').update({ total_value: newTotal }).eq('id', poId)
      po.total_value = newTotal
      items = items.filter(i => i.id !== itemId)
      window.showToast('Item removed.', 'success')
      render()
    }

    async function recordPayment() {
      const amount = parseFloat(document.getElementById('pay-amount').value) || 0
      if (amount <= 0) return
      const newPaid = (po.amount_paid || 0) + amount
      const newStatus = newPaid >= (po.total_value || 0) ? 'paid' : 'partial'
      const { error } = await window._sb.from('purchase_orders').update({ amount_paid: newPaid, payment_status: newStatus }).eq('id', poId)
      if (error) { window.showToast('Error: ' + error.message, 'error'); return }
      po.amount_paid = newPaid
      po.payment_status = newStatus
      window.showToast('Payment recorded!', 'success')
      closePaymentModal()
      render()
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeItemModal(); closePaymentModal() } })
    load()
  </script>
</body>
</html>
