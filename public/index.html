<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supploxi — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary); }
    .auth-container { width: 100%; max-width: 420px; padding: 20px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo .logo-text { font-size: 32px; font-weight: 700; }
    .auth-logo .logo-text span { color: var(--green); }
    .auth-logo p { color: var(--text-muted); margin-top: 8px; font-size: 15px; }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
    .auth-tabs { display: flex; gap: 4px; background: var(--bg-primary); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 28px; }
    .auth-tab { flex: 1; padding: 8px; text-align: center; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
    .auth-tab.active { background: var(--bg-card); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .divider { text-align: center; color: var(--text-dim); font-size: 12px; margin: 16px 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .forgot-link { font-size: 13px; color: var(--green); cursor: pointer; float: right; margin-top: -4px; }
    .terms-check { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .terms-check input { margin-top: 3px; flex-shrink: 0; accent-color: var(--green); }
    .terms-check a { white-space: nowrap; }
    .success-msg { background: var(--green-dim); border: 1px solid rgba(0,212,170,0.3); border-radius: var(--radius-sm); padding: 14px; color: var(--green); font-size: 14px; text-align: center; display: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="logo-text"><span>S</span>upploxi</div>
      <p>Import smarter. Grow faster.</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('signin')">Sign In</div>
        <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
      </div>

      <!-- SIGN IN -->
      <div class="auth-form active" id="form-signin">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="signin-email" class="form-input" placeholder="you@company.com">
        </div>
        <div class="form-group">
          <label class="form-label">
            Password
            <span class="forgot-link" onclick="showForgotModal()">Forgot password?</span>
          </label>
          <input type="password" id="signin-password" class="form-input" placeholder="••••••••">
          <div class="form-error" id="signin-error"></div>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:15px" onclick="handleSignIn()" id="signin-btn">
          Sign In
        </button>
      </div>

      <!-- SIGN UP -->
      <div class="auth-form" id="form-signup">
        <div class="success-msg" id="signup-success">
          Account created! Check your email to confirm, then sign in.
        </div>
        <div id="signup-fields">
          <div class="form-group">
            <label class="form-label">Email <span class="required">*</span></label>
            <input type="email" id="signup-email" class="form-input" placeholder="you@company.com">
          </div>
          <div class="form-group">
            <label class="form-label">Password <span class="required">*</span></label>
            <input type="password" id="signup-password" class="form-input" placeholder="Min. 8 characters">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password <span class="required">*</span></label>
            <input type="password" id="signup-confirm" class="form-input" placeholder="••••••••">
            <div class="form-error" id="signup-error"></div>
          </div>
          <div class="form-group">
            <label class="terms-check">
              <input type="checkbox" id="signup-terms">
              I agree to the <a href="#" style="color:var(--green);margin:0 3px">Terms of Service</a> and <a href="#" style="color:var(--green);margin:0 3px">Privacy Policy</a>
            </label>
          </div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:15px" onclick="handleSignUp()" id="signup-btn">
            Create Free Account
          </button>
          <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:12px">14-day free trial · No credit card required</p>
        </div>
      </div>
    </div>
  </div>

  <!-- FORGOT PASSWORD MODAL -->
  <div class="modal-overlay" id="forgot-modal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <span class="modal-title">Reset Password</span>
        <button class="modal-close" onclick="closeForgotModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:16px">Enter your email and we'll send you a reset link.</p>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="forgot-email" class="form-input" placeholder="you@company.com">
          <div class="form-error" id="forgot-error"></div>
        </div>
        <div id="forgot-success" style="display:none;color:var(--green);font-size:14px">Reset link sent! Check your email.</div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeForgotModal()">Cancel</button>
        <button class="btn btn-primary" onclick="handleForgotPassword()">Send Reset Link</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script>
    // Redirect if already logged in
    window.getUser().then(user => {
      if (user) window.location.href = '/dashboard.html'
    })

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) =>
        t.classList.toggle('active', (i === 0 && tab === 'signin') || (i === 1 && tab === 'signup'))
      )
      document.querySelectorAll('.auth-form').forEach((f, i) =>
        f.classList.toggle('active', (i === 0 && tab === 'signin') || (i === 1 && tab === 'signup'))
      )
    }

    async function handleSignIn() {
      const email = document.getElementById('signin-email').value.trim()
      const password = document.getElementById('signin-password').value
      const errEl = document.getElementById('signin-error')
      const btn = document.getElementById('signin-btn')
      errEl.textContent = ''

      if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return }

      btn.textContent = 'Signing in...'
      btn.disabled = true

      const { error } = await window._sb.auth.signInWithPassword({ email, password })
      if (error) {
        errEl.textContent = error.message
        btn.textContent = 'Sign In'
        btn.disabled = false
        return
      }

      window.location.href = '/dashboard.html'
    }

    async function handleSignUp() {
      const email = document.getElementById('signup-email').value.trim()
      const password = document.getElementById('signup-password').value
      const confirm = document.getElementById('signup-confirm').value
      const terms = document.getElementById('signup-terms').checked
      const errEl = document.getElementById('signup-error')
      const btn = document.getElementById('signup-btn')
      errEl.textContent = ''

      if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return }
      if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; return }
      if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; return }
      if (!terms) { errEl.textContent = 'Please accept the Terms of Service.'; return }

      btn.textContent = 'Creating account...'
      btn.disabled = true

      const { data, error } = await window._sb.auth.signUp({
        email,
        password
      })

      if (error) {
        errEl.textContent = error.message
        btn.textContent = 'Create Free Account'
        btn.disabled = false
        return
      }

      document.getElementById('signup-fields').style.display = 'none'
      document.getElementById('signup-success').style.display = 'block'
    }

    function showForgotModal() {
      document.getElementById('forgot-modal').classList.add('active')
    }

    function closeForgotModal() {
      document.getElementById('forgot-modal').classList.remove('active')
      document.getElementById('forgot-error').textContent = ''
      document.getElementById('forgot-success').style.display = 'none'
      document.getElementById('forgot-email').value = ''
    }

    async function handleForgotPassword() {
      const email = document.getElementById('forgot-email').value.trim()
      if (!email) { document.getElementById('forgot-error').textContent = 'Enter your email.'; return }
      const { error } = await window._sb.auth.resetPasswordForEmail(email)
      if (error) { document.getElementById('forgot-error').textContent = error.message; return }
      document.getElementById('forgot-success').style.display = 'block'
    }

    // Enter key handlers
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('form-signin').classList.contains('active')) handleSignIn()
        else handleSignUp()
      }
    })
  </script>
</body>
</html>
