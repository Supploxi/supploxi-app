<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supploxi — Supplier Detail</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/layout.js"></script>
  <style>
    /* ---- Supplier Header ---- */
    .supplier-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .supplier-header-avatar {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .95rem;
      color: #fff;
      flex-shrink: 0;
    }

    .supplier-header-info {
      flex: 1;
      min-width: 0;
    }

    .supplier-header-info h2 {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -.02em;
      margin-bottom: 4px;
    }

    .supplier-header-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .supplier-header-meta .badge {
      vertical-align: middle;
    }

    .supplier-header-country {
      font-size: .85rem;
      color: var(--text-muted);
    }

    .supplier-header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    /* ---- Info Grid ---- */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .info-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }

    .info-card.full-width {
      grid-column: 1 / -1;
    }

    .info-label {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .info-value {
      font-size: .9rem;
      color: var(--text);
      font-weight: 500;
      word-break: break-word;
    }

    .info-value.muted {
      color: var(--text-dim);
    }

    /* ---- Performance Metrics ---- */
    .metric-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .metric-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px;
      text-align: center;
    }

    .metric-card-label {
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .metric-card-value {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .metric-card-value.score-good { color: var(--primary); }
    .metric-card-value.score-ok { color: var(--warning); }
    .metric-card-value.score-bad { color: var(--danger); }

    .metric-card-sub {
      font-size: .75rem;
      color: var(--text-dim);
    }

    .metric-progress-bar {
      width: 80%;
      max-width: 120px;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin: 10px auto 0;
    }

    .metric-progress-bar-fill {
      height: 100%;
      border-radius: 4px;
    }

    /* ---- On-time progress inline ---- */
    .ontime-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ontime-bar {
      flex: 1;
      max-width: 100px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .ontime-bar-fill {
      height: 100%;
      border-radius: 3px;
    }

    /* ---- Performance Placeholder ---- */
    .perf-placeholder {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 32px;
      text-align: center;
      color: var(--text-dim);
      font-size: .85rem;
    }

    /* ---- Table Links ---- */
    .detail-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .detail-link:hover {
      text-decoration: underline;
    }

    /* ---- Back Link ---- */
    .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: .85rem;
      font-weight: 500;
      transition: color .15s;
    }

    .back-link:hover {
      color: var(--text);
    }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      .info-grid {
        grid-template-columns: 1fr;
      }

      .metric-cards {
        grid-template-columns: 1fr;
      }

      .supplier-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .supplier-header-actions {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Main Content Area -->
  <div class="main" id="mainContent" style="display:none">
    <!-- Loading State -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      Loading supplier details...
    </div>

    <!-- Supplier Content (populated by JS) -->
    <div id="supplierContent" style="display:none"></div>
  </div>

  <script>
    let currentUser = null;
    let supplier = null;
    let supplierId = null;

    // ---- Avatar Color Hash ----
    function nameColor(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
      return 'hsl(' + (Math.abs(hash) % 360) + ', 60%, 45%)';
    }

    function getInitials(name) {
      if (!name) return '?';
      var parts = name.trim().split(/\s+/);
      if (parts.length >= 2) {
        return (parts[0][0] + parts[1][0]).toUpperCase();
      }
      return name.substring(0, 2).toUpperCase();
    }

    // ---- INITIALIZATION ----
    async function init() {
      currentUser = await requireAuth();
      if (!currentUser) return;

      renderLayout('suppliers');
      document.getElementById('mainContent').style.display = 'block';

      // Get supplier ID from URL
      var params = new URLSearchParams(window.location.search);
      supplierId = params.get('id');

      if (!supplierId) {
        document.getElementById('loadingState').innerHTML = '<div class="empty-state"><p>No supplier specified</p><small><a href="/suppliers.html" class="back-link">Back to Suppliers</a></small></div>';
        return;
      }

      await loadSupplier();
    }

    // ---- LOAD SUPPLIER ----
    async function loadSupplier() {
      var { data, error } = await window._supabase
        .from('suppliers')
        .select('*')
        .eq('id', supplierId)
        .eq('user_id', currentUser.id)
        .single();

      if (error || !data) {
        document.getElementById('loadingState').innerHTML = '<div class="empty-state"><p>Supplier not found</p><small><a href="/suppliers.html" class="back-link">Back to Suppliers</a></small></div>';
        return;
      }

      supplier = data;
      document.title = 'Supploxi — ' + escapeHtml(supplier.company_name || 'Supplier');

      renderSupplierPage();
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('supplierContent').style.display = 'block';

      // Load tab data
      bindTabs();
      loadProductsTab();
      loadOrdersTab();
      loadShipmentsTab();
    }

    // ---- RENDER SUPPLIER PAGE ----
    function renderSupplierPage() {
      var s = supplier;
      var name = s.company_name || 'Unknown Supplier';
      var initials = getInitials(name);
      var avatarBg = nameColor(name);
      var flag = countryFlag(s.country || '');
      var country = escapeHtml(s.country || '');
      var status = s.status || 'active';

      // Score color
      var score = s.score != null ? s.score : null;
      var scoreClass = '';
      var scoreBg = '';
      var scoreColor = '';
      if (score !== null) {
        if (score >= 80) {
          scoreClass = 'score-good';
          scoreBg = 'rgba(0,212,170,.15)';
          scoreColor = 'var(--primary)';
        } else if (score >= 60) {
          scoreClass = 'score-ok';
          scoreBg = 'rgba(245,158,11,.15)';
          scoreColor = 'var(--warning)';
        } else {
          scoreClass = 'score-bad';
          scoreBg = 'rgba(255,71,87,.15)';
          scoreColor = 'var(--danger)';
        }
      }

      // On-time rate bar
      var onTimeRate = s.on_time_rate != null ? s.on_time_rate : null;
      var onTimeHtml = '<span class="info-value muted">--</span>';
      if (onTimeRate !== null) {
        var barColor;
        if (onTimeRate > 90) barColor = 'var(--primary)';
        else if (onTimeRate >= 70) barColor = 'var(--warning)';
        else barColor = 'var(--danger)';
        onTimeHtml = '<div class="ontime-bar-wrap">' +
          '<div class="ontime-bar"><div class="ontime-bar-fill" style="width:' + onTimeRate + '%;background:' + barColor + '"></div></div>' +
          '<span class="info-value">' + onTimeRate + '%</span>' +
        '</div>';
      }

      // Score badge
      var scoreHtml = '<span class="info-value muted">--</span>';
      if (score !== null) {
        scoreHtml = '<span class="score-badge" style="background:' + scoreBg + ';color:' + scoreColor + '">' + score + '</span>';
      }

      var html = '';

      // ---- Page Header ----
      html += '<div class="supplier-header">' +
        '<div class="supplier-header-avatar" style="background:' + avatarBg + '">' + escapeHtml(initials) + '</div>' +
        '<div class="supplier-header-info">' +
          '<h2>' + escapeHtml(name) + '</h2>' +
          '<div class="supplier-header-meta">' +
            statusBadge(status) +
            (country ? '<span class="supplier-header-country">' + flag + ' ' + country + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="supplier-header-actions">' +
          '<a href="/suppliers.html?action=edit&id=' + supplierId + '" class="btn btn-primary">Edit</a>' +
          '<a href="/suppliers.html" class="btn btn-secondary">Back to Suppliers</a>' +
        '</div>' +
      '</div>';

      // ---- Tabs ----
      html += '<div class="tabs">' +
        '<button class="tab-btn active" data-tab="overview">Overview</button>' +
        '<button class="tab-btn" data-tab="products">Products</button>' +
        '<button class="tab-btn" data-tab="orders">Orders</button>' +
        '<button class="tab-btn" data-tab="shipments">Shipments</button>' +
        '<button class="tab-btn" data-tab="performance">Performance</button>' +
      '</div>';

      // ---- TAB: Overview ----
      html += '<div class="tab-content active" id="tab-overview">';
      html += '<div class="info-grid">';

      // Contact Name
      html += '<div class="info-card">' +
        '<div class="info-label">Contact Name</div>' +
        '<div class="info-value">' + (s.contact_name ? escapeHtml(s.contact_name) : '<span class="muted">--</span>') + '</div>' +
      '</div>';

      // Email
      html += '<div class="info-card">' +
        '<div class="info-label">Email</div>' +
        '<div class="info-value">' + (s.email ? escapeHtml(s.email) : '<span class="muted">--</span>') + '</div>' +
      '</div>';

      // Phone
      html += '<div class="info-card">' +
        '<div class="info-label">Phone</div>' +
        '<div class="info-value">' + (s.phone ? escapeHtml(s.phone) : '<span class="muted">--</span>') + '</div>' +
      '</div>';

      // Country
      html += '<div class="info-card">' +
        '<div class="info-label">Country</div>' +
        '<div class="info-value">' + (s.country ? flag + ' ' + escapeHtml(s.country) : '<span class="muted">--</span>') + '</div>' +
      '</div>';

      // City
      html += '<div class="info-card">' +
        '<div class="info-label">City</div>' +
        '<div class="info-value">' + (s.city ? escapeHtml(s.city) : '<span class="muted">--</span>') + '</div>' +
      '</div>';

      // Category
      html += '<div class="info-card">' +
        '<div class="info-label">Category</div>' +
        '<div class="info-value">' + (s.category ? escapeHtml(s.category) : '<span class="muted">--</span>') + '</div>' +
      '</div>';

      // Payment Terms
      html += '<div class="info-card">' +
        '<div class="info-label">Payment Terms</div>' +
        '<div class="info-value">' + (s.payment_terms ? escapeHtml(s.payment_terms) : '<span class="muted">--</span>') + '</div>' +
      '</div>';

      // Lead Time
      html += '<div class="info-card">' +
        '<div class="info-label">Lead Time</div>' +
        '<div class="info-value">' + (s.lead_time_days != null ? s.lead_time_days + ' days' : '<span class="muted">--</span>') + '</div>' +
      '</div>';

      // MOQ
      html += '<div class="info-card">' +
        '<div class="info-label">Minimum Order Quantity</div>' +
        '<div class="info-value">' + (s.moq != null ? s.moq.toLocaleString() : '<span class="muted">--</span>') + '</div>' +
      '</div>';

      // Currency
      html += '<div class="info-card">' +
        '<div class="info-label">Currency</div>' +
        '<div class="info-value">' + escapeHtml(s.currency || 'USD') + '</div>' +
      '</div>';

      // Score
      html += '<div class="info-card">' +
        '<div class="info-label">Score</div>' +
        '<div class="info-value">' + scoreHtml + '</div>' +
      '</div>';

      // On-Time Rate
      html += '<div class="info-card">' +
        '<div class="info-label">On-Time Rate</div>' +
        onTimeHtml +
      '</div>';

      // Total Orders
      html += '<div class="info-card">' +
        '<div class="info-label">Total Orders</div>' +
        '<div class="info-value">' + (s.total_orders != null ? s.total_orders : '<span class="muted">--</span>') + '</div>' +
      '</div>';

      // Notes (full width)
      html += '<div class="info-card full-width">' +
        '<div class="info-label">Notes</div>' +
        '<div class="info-value">' + (s.notes ? escapeHtml(s.notes) : '<span class="muted">No notes</span>') + '</div>' +
      '</div>';

      html += '</div>'; // end info-grid
      html += '</div>'; // end tab-overview

      // ---- TAB: Products ----
      html += '<div class="tab-content" id="tab-products">' +
        '<div class="section"><div class="loading" id="productsLoading"><div class="spinner"></div>Loading products...</div></div>' +
      '</div>';

      // ---- TAB: Orders ----
      html += '<div class="tab-content" id="tab-orders">' +
        '<div class="section"><div class="loading" id="ordersLoading"><div class="spinner"></div>Loading orders...</div></div>' +
      '</div>';

      // ---- TAB: Shipments ----
      html += '<div class="tab-content" id="tab-shipments">' +
        '<div class="section"><div class="loading" id="shipmentsLoading"><div class="spinner"></div>Loading shipments...</div></div>' +
      '</div>';

      // ---- TAB: Performance ----
      html += '<div class="tab-content" id="tab-performance">';
      html += renderPerformanceTab();
      html += '</div>';

      document.getElementById('supplierContent').innerHTML = html;
    }

    // ---- RENDER PERFORMANCE TAB ----
    function renderPerformanceTab() {
      var s = supplier;
      var score = s.score != null ? s.score : null;
      var onTimeRate = s.on_time_rate != null ? s.on_time_rate : null;
      var avgLeadTime = s.lead_time_days != null ? s.lead_time_days : null;

      // Score color class
      var scoreClass = 'score-good';
      if (score !== null) {
        if (score >= 80) scoreClass = 'score-good';
        else if (score >= 60) scoreClass = 'score-ok';
        else scoreClass = 'score-bad';
      }

      // On-time rate color
      var onTimeBarColor = 'var(--primary)';
      if (onTimeRate !== null) {
        if (onTimeRate > 90) onTimeBarColor = 'var(--primary)';
        else if (onTimeRate >= 70) onTimeBarColor = 'var(--warning)';
        else onTimeBarColor = 'var(--danger)';
      }

      var html = '<div class="metric-cards">';

      // Score card
      html += '<div class="metric-card">' +
        '<div class="metric-card-label">Score</div>' +
        '<div class="metric-card-value ' + (score !== null ? scoreClass : '') + '">' + (score !== null ? score : '--') + '</div>' +
        '<div class="metric-card-sub">out of 100</div>' +
      '</div>';

      // On-Time Rate card
      html += '<div class="metric-card">' +
        '<div class="metric-card-label">On-Time Rate</div>' +
        '<div class="metric-card-value ' + (onTimeRate !== null ? (onTimeRate > 90 ? 'score-good' : (onTimeRate >= 70 ? 'score-ok' : 'score-bad')) : '') + '">' + (onTimeRate !== null ? onTimeRate + '%' : '--') + '</div>';
      if (onTimeRate !== null) {
        html += '<div class="metric-progress-bar"><div class="metric-progress-bar-fill" style="width:' + onTimeRate + '%;background:' + onTimeBarColor + '"></div></div>';
      } else {
        html += '<div class="metric-card-sub">No data</div>';
      }
      html += '</div>';

      // Avg Lead Time card
      html += '<div class="metric-card">' +
        '<div class="metric-card-label">Avg Lead Time</div>' +
        '<div class="metric-card-value">' + (avgLeadTime !== null ? avgLeadTime : '--') + '</div>' +
        '<div class="metric-card-sub">' + (avgLeadTime !== null ? 'days' : 'No data') + '</div>' +
      '</div>';

      html += '</div>';

      // Performance History placeholder
      html += '<div class="perf-placeholder">' +
        '<p>Detailed performance analytics will be available as more orders are completed.</p>' +
      '</div>';

      return html;
    }

    // ---- TABS SYSTEM ----
    function bindTabs() {
      var tabBtns = document.querySelectorAll('.tab-btn');
      tabBtns.forEach(function(btn) {
        btn.addEventListener('click', function() {
          // Remove active from all tabs
          tabBtns.forEach(function(b) { b.classList.remove('active'); });
          var tabContents = document.querySelectorAll('.tab-content');
          tabContents.forEach(function(tc) { tc.classList.remove('active'); });

          // Activate clicked tab
          btn.classList.add('active');
          var tabId = 'tab-' + btn.getAttribute('data-tab');
          var tabEl = document.getElementById(tabId);
          if (tabEl) tabEl.classList.add('active');
        });
      });
    }

    // ---- LOAD PRODUCTS TAB ----
    async function loadProductsTab() {
      var container = document.getElementById('tab-products');

      var { data, error } = await window._supabase
        .from('products')
        .select('*')
        .eq('primary_supplier_id', supplierId)
        .eq('user_id', currentUser.id)
        .order('name', { ascending: true });

      if (error) {
        container.innerHTML = '<div class="section"><div class="empty-state"><p>Failed to load products</p><small>' + escapeHtml(error.message) + '</small></div></div>';
        return;
      }

      var products = data || [];

      if (products.length === 0) {
        container.innerHTML = '<div class="section"><div class="empty-state"><p>No products from this supplier</p><small>Products linked to this supplier will appear here</small></div></div>';
        return;
      }

      var rows = '';
      products.forEach(function(p) {
        var name = escapeHtml(p.name || p.product_name || 'Unnamed');
        var sku = escapeHtml(p.sku || '--');
        var costPrice = p.cost_price != null ? formatCurrency(p.cost_price) : '--';
        var sellingPrice = p.selling_price != null ? formatCurrency(p.selling_price) : '--';
        var margin = '--';
        if (p.cost_price != null && p.selling_price != null && p.cost_price > 0) {
          margin = (((p.selling_price - p.cost_price) / p.selling_price) * 100).toFixed(1) + '%';
        }
        var stock = p.stock_quantity != null ? p.stock_quantity.toLocaleString() : '--';

        rows += '<tr>' +
          '<td class="cell-primary">' + name + '</td>' +
          '<td>' + sku + '</td>' +
          '<td>' + costPrice + '</td>' +
          '<td>' + sellingPrice + '</td>' +
          '<td>' + margin + '</td>' +
          '<td>' + stock + '</td>' +
        '</tr>';
      });

      container.innerHTML = '<div class="section">' +
        '<table>' +
          '<thead><tr>' +
            '<th>Product Name</th>' +
            '<th>SKU</th>' +
            '<th>Cost Price</th>' +
            '<th>Selling Price</th>' +
            '<th>Margin %</th>' +
            '<th>Stock</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>';
    }

    // ---- LOAD ORDERS TAB ----
    async function loadOrdersTab() {
      var container = document.getElementById('tab-orders');

      var { data, error } = await window._supabase
        .from('purchase_orders')
        .select('*')
        .eq('supplier_id', supplierId)
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

      if (error) {
        container.innerHTML = '<div class="section"><div class="empty-state"><p>Failed to load orders</p><small>' + escapeHtml(error.message) + '</small></div></div>';
        return;
      }

      var orders = data || [];

      if (orders.length === 0) {
        container.innerHTML = '<div class="section"><div class="empty-state"><p>No purchase orders with this supplier</p><small>Orders placed with this supplier will appear here</small></div></div>';
        return;
      }

      var rows = '';
      orders.forEach(function(o) {
        var poNumber = escapeHtml(o.po_number || '--');
        var orderDate = formatDate(o.created_at);
        var expectedDelivery = formatDate(o.expected_delivery);
        var totalValue = formatCurrency(o.total_value);
        var status = o.status || 'Draft';

        rows += '<tr>' +
          '<td><a href="/po-detail.html?id=' + o.id + '" class="detail-link">' + poNumber + '</a></td>' +
          '<td>' + orderDate + '</td>' +
          '<td>' + expectedDelivery + '</td>' +
          '<td class="cell-primary">' + totalValue + '</td>' +
          '<td>' + statusBadge(status) + '</td>' +
        '</tr>';
      });

      container.innerHTML = '<div class="section">' +
        '<table>' +
          '<thead><tr>' +
            '<th>PO Number</th>' +
            '<th>Order Date</th>' +
            '<th>Expected Delivery</th>' +
            '<th>Total Value</th>' +
            '<th>Status</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>';
    }

    // ---- LOAD SHIPMENTS TAB ----
    async function loadShipmentsTab() {
      var container = document.getElementById('tab-shipments');

      var { data, error } = await window._supabase
        .from('shipments')
        .select('*')
        .eq('supplier_id', supplierId)
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

      if (error) {
        container.innerHTML = '<div class="section"><div class="empty-state"><p>Failed to load shipments</p><small>' + escapeHtml(error.message) + '</small></div></div>';
        return;
      }

      var shipments = data || [];

      if (shipments.length === 0) {
        container.innerHTML = '<div class="section"><div class="empty-state"><p>No shipments from this supplier</p><small>Shipments from this supplier will appear here</small></div></div>';
        return;
      }

      var rows = '';
      shipments.forEach(function(sh) {
        var tracking = escapeHtml(sh.tracking_number || '--');
        var shipDate = formatDate(sh.ship_date);
        var eta = formatDate(sh.estimated_arrival);
        var status = sh.status || 'pending';
        var carrier = escapeHtml(sh.carrier || '--');

        var trackingCell = sh.tracking_number
          ? '<a href="/shipment-detail.html?id=' + sh.id + '" class="detail-link">' + tracking + '</a>'
          : '<a href="/shipment-detail.html?id=' + sh.id + '" class="detail-link">View</a>';

        rows += '<tr>' +
          '<td>' + trackingCell + '</td>' +
          '<td>' + shipDate + '</td>' +
          '<td>' + eta + '</td>' +
          '<td>' + statusBadge(status) + '</td>' +
          '<td>' + carrier + '</td>' +
        '</tr>';
      });

      container.innerHTML = '<div class="section">' +
        '<table>' +
          '<thead><tr>' +
            '<th>Tracking Number</th>' +
            '<th>Ship Date</th>' +
            '<th>ETA</th>' +
            '<th>Status</th>' +
            '<th>Carrier</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>';
    }

    // ---- START ----
    init();
  </script>
</body>
</html>
