<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supploxi — Purchase Orders</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .action-btns { display:flex; gap:6px; opacity:0; transition:opacity 0.15s; }
    tr:hover .action-btns { opacity:1; }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="page-content">

      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total POs</div><div class="stat-value" id="stat-total">—</div><div class="stat-sub">All time</div></div>
        <div class="stat-card"><div class="stat-label">Open Value</div><div class="stat-value" id="stat-open">—</div><div class="stat-sub">Not yet received</div></div>
        <div class="stat-card"><div class="stat-label">Pending Payment</div><div class="stat-value" id="stat-pending">—</div><div class="stat-sub" style="color:var(--orange)">Awaiting payment</div></div>
        <div class="stat-card"><div class="stat-label">This Month</div><div class="stat-value" id="stat-month">—</div><div class="stat-sub">New orders</div></div>
      </div>

      <div class="table-container">
        <div class="table-header">
          <div class="search-wrapper" style="flex:1">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" class="search-input" id="search" placeholder="Search PO number or supplier..." oninput="renderTable()">
          </div>
          <select class="form-select" style="width:150px" id="filter-status" onchange="renderTable()">
            <option value="">All Status</option>
            <option value="draft">Draft</option>
            <option value="sent">Sent</option>
            <option value="confirmed">Confirmed</option>
            <option value="in_production">In Production</option>
            <option value="shipped">Shipped</option>
            <option value="partially_received">Partially Received</option>
            <option value="received">Received</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <button class="btn btn-primary" onclick="openModal()">+ New Order</button>
        </div>
        <div id="table-body">
          <div class="empty-state"><div class="empty-state-icon">--</div><h3>No purchase orders yet</h3><p>Create your first purchase order to start managing your imports</p><button class="btn btn-primary" onclick="openModal()">+ Create Order</button></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL NEW PO -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">New Purchase Order</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Supplier <span class="required">*</span></label>
          <select id="f-supplier" class="form-select">
            <option value="">Select supplier...</option>
          </select>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Order Date</label>
            <input type="date" id="f-date" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Expected Delivery</label>
            <input type="date" id="f-delivery" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">Payment Terms</label>
            <select id="f-payment" class="form-select">
              <option value="Net 30">Net 30</option>
              <option value="Net 60">Net 60</option>
              <option value="Prepaid">Prepaid</option>
              <option value="50/50">50/50</option>
              <option value="30/70">30/70</option>
              <option value="LC">Letter of Credit</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Shipping Method</label>
            <select id="f-shipping" class="form-select">
              <option value="Sea Freight">Sea Freight</option>
              <option value="Air Freight">Air Freight</option>
              <option value="Express">Express (DHL/FedEx)</option>
              <option value="Rail">Rail</option>
              <option value="Courier">Courier</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea id="f-notes" class="form-textarea" placeholder="Special instructions, product specifications..."></textarea>
        </div>
        <div class="form-error" id="modal-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createPO()">Create Order →</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/business-logic.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let orders = []
    let suppliers = []

    async function load() {
      const user = await window.requireAuth()
      await window.initLayout({ page: 'purchase-orders', title: 'Purchase Orders' })

      // Pré-seleciona supplier se veio por querystring
      const params = new URLSearchParams(location.search)
      const preSupplier = params.get('supplier')

      const [{ data: o }, { data: s }] = await Promise.all([
        window._sb.from('purchase_orders').select('*, suppliers(company_name)').eq('user_id', user.id).order('created_at', { ascending: false }),
        window._sb.from('suppliers').select('id,company_name').eq('user_id', user.id).eq('status','active')
      ])
      orders = o || []
      suppliers = s || []

      const sel = document.getElementById('f-supplier')
      sel.innerHTML = '<option value="">Select supplier...</option>' + suppliers.map(s => `<option value="${s.id}" ${s.id === preSupplier ? 'selected' : ''}>${window.escapeHtml(s.company_name)}</option>`).join('')

      // Data padrão hoje
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0]

      updateStats()
      renderTable()

      if (preSupplier) openModal()
    }

    function updateStats() {
      const open = orders.filter(o => !['received','cancelled'].includes(o.status))
      const openVal = open.reduce((a,o) => a+(o.total_value||0), 0)
      const pending = orders.filter(o => o.payment_status === 'pending' && o.status !== 'cancelled')
      const now = new Date()
      const thisMonth = orders.filter(o => {
        const d = new Date(o.created_at)
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()
      })
      document.getElementById('stat-total').textContent = orders.length
      document.getElementById('stat-open').textContent = window.formatCurrency(openVal)
      document.getElementById('stat-pending').textContent = pending.length
      document.getElementById('stat-month').textContent = thisMonth.length
    }

    function renderTable() {
      const q = document.getElementById('search').value.toLowerCase()
      const status = document.getElementById('filter-status').value
      let list = orders.filter(o => {
        if (q && !o.po_number.toLowerCase().includes(q) && !(o.suppliers?.company_name||'').toLowerCase().includes(q)) return false
        if (status && o.status !== status) return false
        return true
      })
      if (!list.length) {
        document.getElementById('table-body').innerHTML = `<div class="empty-state"><div class="empty-state-icon">--</div><h3>No orders found</h3><p>Try adjusting your filters</p></div>`
        return
      }
      document.getElementById('table-body').innerHTML = `
        <table>
          <thead><tr>
            <th>PO Number</th><th>Supplier</th><th>Order Date</th><th>Expected Delivery</th><th>Items</th><th>Total Value</th><th>Payment</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>
            ${list.map(o => {
              const isOverdue = o.expected_delivery && new Date(o.expected_delivery) < new Date() && !['received','cancelled'].includes(o.status)
              return `<tr onclick="window.location.href='/po-detail.html?id=${o.id}'">
                <td><strong>${o.po_number}</strong></td>
                <td>${window.escapeHtml(o.suppliers?.company_name||'—')}</td>
                <td>${window.formatDate(o.order_date)}</td>
                <td style="color:${isOverdue?'var(--red)':'inherit'}">${window.formatDate(o.expected_delivery)}${isOverdue?' (overdue)':''}</td>
                <td>—</td>
                <td><strong>${window.formatCurrency(o.total_value)}</strong></td>
                <td>${window.getStatusBadge(o.payment_status||'pending')}</td>
                <td>${window.getStatusBadge(o.status)}</td>
                <td onclick="event.stopPropagation()">
                  <div class="action-btns">
                    <button class="btn btn-sm btn-secondary" onclick="window.location.href='/po-detail.html?id=${o.id}'" title="View">View</button>
                  </div>
                </td>
              </tr>`
            }).join('')}
          </tbody>
        </table>`
    }

    function openModal() { document.getElementById('modal').classList.add('active') }
    function closeModal() { document.getElementById('modal').classList.remove('active') }

    async function createPO() {
      const supplierId = document.getElementById('f-supplier').value
      if (!supplierId) { document.getElementById('modal-error').textContent = 'Please select a supplier.'; return }
      const user = await window.getUser()
      const poNumber = window.generatePONumber()
      const { data, error } = await window._sb.from('purchase_orders').insert({
        user_id: user.id,
        po_number: poNumber,
        supplier_id: supplierId,
        order_date: document.getElementById('f-date').value,
        expected_delivery: document.getElementById('f-delivery').value || null,
        payment_terms: document.getElementById('f-payment').value,
        shipping_method: document.getElementById('f-shipping').value,
        notes: document.getElementById('f-notes').value.trim(),
        status: 'draft'
      }).select().single()
      if (error) { document.getElementById('modal-error').textContent = error.message; return }
      window.showToast('Purchase order created!', 'success')
      window.location.href = `/po-detail.html?id=${data.id}`
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal() })
    load()
  </script>
</body>
</html>
