<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supploxi — Purchase Orders</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/layout.js"></script>
  <style>
    .po-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .po-link:hover {
      text-decoration: underline;
    }

    .actions-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .table-responsive {
      overflow-x: auto;
    }

    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      z-index: 600;
      align-items: center;
      justify-content: center;
    }
    .confirm-overlay.show { display: flex; }

    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .confirm-box h4 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .confirm-box p {
      font-size: .85rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .confirm-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div class="loading" id="loadingScreen">
    <div class="spinner"></div>
    Loading...
  </div>

  <!-- Main Content -->
  <div class="main" id="mainContent" style="display:none">

    <!-- Page Header -->
    <div class="page-header">
      <h2>Purchase Orders</h2>
      <button class="btn btn-primary" id="btnNewOrder">+ New Order</button>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search PO number, supplier...">
      <select class="filter-select" id="statusFilter">
        <option value="">All Statuses</option>
        <option value="Draft">Draft</option>
        <option value="Sent">Sent</option>
        <option value="Confirmed">Confirmed</option>
        <option value="In Production">In Production</option>
        <option value="Shipped">Shipped</option>
        <option value="Received">Received</option>
        <option value="Cancelled">Cancelled</option>
      </select>
    </div>

    <!-- Table -->
    <div class="section">
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>PO Number</th>
              <th>Supplier</th>
              <th>Date Created</th>
              <th>Expected Delivery</th>
              <th>Items</th>
              <th>Total Value</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody">
            <tr>
              <td colspan="8">
                <div class="loading">
                  <div class="spinner"></div>
                  Loading orders...
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- New Order Modal -->
  <div class="modal-overlay" id="newOrderModal">
    <div class="modal">
      <div class="modal-header">
        <h3>New Purchase Order</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <form id="newOrderForm">
          <div class="form-group">
            <label for="supplierSelect">Supplier</label>
            <select class="form-control" id="supplierSelect" required>
              <option value="">Select a supplier...</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="expectedDelivery">Expected Delivery Date</label>
              <input type="date" class="form-control" id="expectedDelivery" required>
            </div>
            <div class="form-group">
              <label for="paymentTerms">Payment Terms</label>
              <select class="form-control" id="paymentTerms" required>
                <option value="Net 30">Net 30</option>
                <option value="Net 60">Net 60</option>
                <option value="Prepaid">Prepaid</option>
                <option value="50/50">50/50</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="shippingMethod">Shipping Method</label>
            <select class="form-control" id="shippingMethod" required>
              <option value="Sea Freight">Sea Freight</option>
              <option value="Air Freight">Air Freight</option>
              <option value="Express">Express</option>
              <option value="Rail">Rail</option>
            </select>
          </div>
          <div class="form-group">
            <label for="orderNotes">Notes</label>
            <textarea class="form-control" id="orderNotes" rows="3" placeholder="Additional notes or instructions..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="modalSaveBtn">Create Order</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm -->
  <div class="confirm-overlay" id="deleteConfirm">
    <div class="confirm-box">
      <h4>Delete Purchase Order</h4>
      <p id="deleteConfirmText">Are you sure you want to delete this order? This action cannot be undone.</p>
      <div class="confirm-actions">
        <button class="btn btn-secondary" id="deleteCancelBtn">Cancel</button>
        <button class="btn btn-danger" id="deleteConfirmBtn">Delete</button>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let allOrders = [];
    let supplierMap = {};
    let itemCountMap = {};
    let deleteTargetId = null;

    async function init() {
      currentUser = await requireAuth();
      if (!currentUser) return;

      renderLayout('orders');

      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';

      await Promise.all([loadSuppliers(), loadOrders()]);

      // Check if we should auto-open the modal
      const params = new URLSearchParams(window.location.search);
      if (params.get('action') === 'add') {
        openModal();
      }
    }

    // ---- Load Suppliers for dropdown and mapping ----
    async function loadSuppliers() {
      const { data, error } = await window._supabase
        .from('suppliers')
        .select('id, company_name')
        .eq('user_id', currentUser.id)
        .order('company_name', { ascending: true });

      if (error) {
        console.error('Error loading suppliers:', error);
        return;
      }

      const select = document.getElementById('supplierSelect');
      (data || []).forEach(s => {
        supplierMap[s.id] = s.company_name;
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.company_name;
        select.appendChild(opt);
      });
    }

    // ---- Load Orders ----
    async function loadOrders() {
      const { data, error } = await window._supabase
        .from('purchase_orders')
        .select('*, suppliers(company_name)')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error loading orders:', error);
        renderTable([]);
        return;
      }

      allOrders = data || [];

      // Build supplier map from joined data as well
      allOrders.forEach(o => {
        if (o.suppliers && o.suppliers.company_name) {
          supplierMap[o.supplier_id] = o.suppliers.company_name;
        }
      });

      // Fetch item counts per PO
      await loadItemCounts();

      applyFilters();
    }

    // ---- Load item counts ----
    async function loadItemCounts() {
      if (allOrders.length === 0) return;

      const poIds = allOrders.map(o => o.id);
      const { data, error } = await window._supabase
        .from('po_items')
        .select('po_id')
        .in('po_id', poIds);

      if (error) {
        console.error('Error loading item counts:', error);
        return;
      }

      itemCountMap = {};
      (data || []).forEach(item => {
        itemCountMap[item.po_id] = (itemCountMap[item.po_id] || 0) + 1;
      });
    }

    // ---- Filter and Search ----
    function applyFilters() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
      const statusVal = document.getElementById('statusFilter').value;

      let filtered = allOrders;

      if (statusVal) {
        filtered = filtered.filter(o => o.status === statusVal);
      }

      if (searchTerm) {
        filtered = filtered.filter(o => {
          const poNum = (o.po_number || '').toLowerCase();
          const supplier = (supplierMap[o.supplier_id] || '').toLowerCase();
          return poNum.includes(searchTerm) || supplier.includes(searchTerm);
        });
      }

      renderTable(filtered);
    }

    // ---- Render Table ----
    function renderTable(orders) {
      const tbody = document.getElementById('ordersTableBody');

      if (!orders || orders.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8">
              <div class="empty-state">
                <p>No purchase orders found</p>
                <small>Click "+ New Order" to create your first purchase order</small>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = orders.map(o => {
        const supplierName = (o.suppliers && o.suppliers.company_name)
          ? escapeHtml(o.suppliers.company_name)
          : escapeHtml(supplierMap[o.supplier_id] || 'Unknown');
        const items = itemCountMap[o.id] || 0;

        return `
          <tr>
            <td>
              <a href="/po-detail.html?id=${o.id}" class="po-link">${escapeHtml(o.po_number || '—')}</a>
            </td>
            <td class="cell-primary">${supplierName}</td>
            <td>${formatDate(o.created_at)}</td>
            <td>${formatDate(o.expected_delivery)}</td>
            <td>${items}</td>
            <td class="cell-primary">${formatCurrency(o.total_value)}</td>
            <td>${statusBadge(o.status)}</td>
            <td>
              <div class="actions-cell">
                <a href="/po-detail.html?id=${o.id}" class="btn btn-secondary btn-sm" title="View">View</a>
                <button class="btn btn-danger btn-sm" onclick="confirmDelete('${o.id}', '${escapeHtml(o.po_number || '')}')" title="Delete">Delete</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    // ---- Generate PO Number ----
    async function generatePoNumber() {
      const year = new Date().getFullYear();
      const prefix = `PO-${year}-`;

      const { data, error } = await window._supabase
        .from('purchase_orders')
        .select('po_number')
        .eq('user_id', currentUser.id)
        .like('po_number', `${prefix}%`)
        .order('po_number', { ascending: false })
        .limit(1);

      let nextNum = 1;
      if (!error && data && data.length > 0) {
        const lastNum = data[0].po_number;
        const parts = lastNum.split('-');
        const num = parseInt(parts[2], 10);
        if (!isNaN(num)) {
          nextNum = num + 1;
        }
      }

      return `${prefix}${String(nextNum).padStart(3, '0')}`;
    }

    // ---- Modal Controls ----
    function openModal() {
      document.getElementById('newOrderModal').classList.add('show');
      // Set default expected delivery to 30 days from now
      const defaultDate = new Date();
      defaultDate.setDate(defaultDate.getDate() + 30);
      document.getElementById('expectedDelivery').value = defaultDate.toISOString().split('T')[0];
    }

    function closeModal() {
      document.getElementById('newOrderModal').classList.remove('show');
      document.getElementById('newOrderForm').reset();
    }

    // ---- Save New Order ----
    async function saveNewOrder() {
      const supplierId = document.getElementById('supplierSelect').value;
      const expectedDelivery = document.getElementById('expectedDelivery').value;
      const paymentTerms = document.getElementById('paymentTerms').value;
      const shippingMethod = document.getElementById('shippingMethod').value;
      const notes = document.getElementById('orderNotes').value.trim();

      if (!supplierId) {
        showToast('Please select a supplier', 'error');
        return;
      }

      if (!expectedDelivery) {
        showToast('Please select an expected delivery date', 'error');
        return;
      }

      const saveBtn = document.getElementById('modalSaveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Creating...';

      try {
        const poNumber = await generatePoNumber();

        const { data, error } = await window._supabase
          .from('purchase_orders')
          .insert({
            user_id: currentUser.id,
            supplier_id: supplierId,
            po_number: poNumber,
            status: 'Draft',
            expected_delivery: expectedDelivery,
            payment_terms: paymentTerms,
            shipping_method: shippingMethod,
            notes: notes || null,
            total_value: 0
          })
          .select()
          .single();

        if (error) {
          console.error('Error creating order:', error);
          showToast('Failed to create order: ' + error.message, 'error');
          saveBtn.disabled = false;
          saveBtn.textContent = 'Create Order';
          return;
        }

        showToast('Purchase order ' + poNumber + ' created');
        window.location.href = '/po-detail.html?id=' + data.id;
      } catch (err) {
        console.error('Unexpected error:', err);
        showToast('An unexpected error occurred', 'error');
        saveBtn.disabled = false;
        saveBtn.textContent = 'Create Order';
      }
    }

    // ---- Delete ----
    function confirmDelete(id, poNumber) {
      deleteTargetId = id;
      document.getElementById('deleteConfirmText').textContent =
        'Are you sure you want to delete ' + (poNumber || 'this order') + '? This action cannot be undone.';
      document.getElementById('deleteConfirm').classList.add('show');
    }

    function closeDeleteConfirm() {
      deleteTargetId = null;
      document.getElementById('deleteConfirm').classList.remove('show');
    }

    async function executeDelete() {
      if (!deleteTargetId) return;

      const btn = document.getElementById('deleteConfirmBtn');
      btn.disabled = true;
      btn.textContent = 'Deleting...';

      // Delete related po_items first
      await window._supabase
        .from('po_items')
        .delete()
        .eq('po_id', deleteTargetId);

      const { error } = await window._supabase
        .from('purchase_orders')
        .delete()
        .eq('id', deleteTargetId)
        .eq('user_id', currentUser.id);

      btn.disabled = false;
      btn.textContent = 'Delete';

      if (error) {
        console.error('Error deleting order:', error);
        showToast('Failed to delete order: ' + error.message, 'error');
      } else {
        showToast('Purchase order deleted');
        allOrders = allOrders.filter(o => o.id !== deleteTargetId);
        delete itemCountMap[deleteTargetId];
        applyFilters();
      }

      closeDeleteConfirm();
    }

    // ---- Event Listeners ----
    document.getElementById('btnNewOrder').addEventListener('click', openModal);
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancelBtn').addEventListener('click', closeModal);
    document.getElementById('modalSaveBtn').addEventListener('click', saveNewOrder);

    document.getElementById('newOrderModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('newOrderModal')) closeModal();
    });

    document.getElementById('deleteCancelBtn').addEventListener('click', closeDeleteConfirm);
    document.getElementById('deleteConfirmBtn').addEventListener('click', executeDelete);

    document.getElementById('deleteConfirm').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deleteConfirm')) closeDeleteConfirm();
    });

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('statusFilter').addEventListener('change', applyFilters);

    // Keyboard: Escape to close modals
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModal();
        closeDeleteConfirm();
      }
    });

    // Init
    init();
  </script>
</body>
</html>
