<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supploxi — Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .settings-section { margin-bottom:28px; padding-bottom:28px; border-bottom:1px solid var(--border); }
    .settings-section:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
    .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); }
    .toggle-row:last-child { border-bottom:none; }
    .toggle-label { font-size:14px; font-weight:500; }
    .toggle-desc { font-size:12px; color:var(--text-muted); margin-top:2px; }
    .toggle { position:relative; width:44px; height:24px; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:var(--border); border-radius:24px; transition:0.3s; }
    .toggle-slider::before { content:''; position:absolute; width:18px; height:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:0.3s; }
    .toggle input:checked + .toggle-slider { background:var(--green); }
    .toggle input:checked + .toggle-slider::before { transform:translateX(20px); }
    .danger-zone { border:1px solid rgba(239,68,68,0.3); border-radius:var(--radius); padding:20px; background:rgba(239,68,68,0.03); }
    .plan-card { border:1px solid var(--green); border-radius:var(--radius); padding:24px; background:var(--green-dim); text-align:center; }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="page-content">

      <div class="tabs">
        <div class="tab active" onclick="switchTab('profile',this)">Profile</div>
        <div class="tab" onclick="switchTab('notifications',this)">Notifications</div>
        <div class="tab" onclick="switchTab('preferences',this)">Preferences</div>
        <div class="tab" onclick="switchTab('billing',this)">Billing</div>
      </div>

      <div id="tab-content" class="card">
        <div class="empty-state"><div class="spinner"></div></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let profile = {}, settings = {}, userEmail = ''

    async function load() {
      const user = await window.requireAuth()
      await window.initLayout({ page: 'settings', title: 'Settings' })
      userEmail = user.email
      const [{ data: p }, { data: s }] = await Promise.all([
        window._sb.from('user_profiles').select('*').eq('user_id', user.id).single(),
        window._sb.from('user_settings').select('*').eq('user_id', user.id).single()
      ])
      profile = p || {}
      settings = s || {}
      switchTab('profile', document.querySelector('.tab'))
    }

    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      if (el) el.classList.add('active')

      if (tab === 'profile') {
        document.getElementById('tab-content').innerHTML = `
          <div class="settings-section">
            <h3 style="font-size:15px;font-weight:600;margin-bottom:20px">Personal Information</h3>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="p-name" class="form-input" value="${window.escapeHtml(profile.full_name||'')}">
              </div>
              <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="p-email" class="form-input" value="${window.escapeHtml(userEmail||'')}" disabled style="opacity:0.6">
                <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Email cannot be changed</div>
              </div>
              <div class="form-group">
                <label class="form-label">Company Name</label>
                <input type="text" id="p-company" class="form-input" value="${window.escapeHtml(profile.company_name||'')}">
              </div>
              <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="text" id="p-phone" class="form-input" value="${window.escapeHtml(profile.phone||'')}">
              </div>
              <div class="form-group">
                <label class="form-label">Timezone</label>
                <select id="p-timezone" class="form-select">
                  ${['America/New_York','America/Chicago','America/Denver','America/Los_Angeles','Pacific/Honolulu'].map(tz => `<option value="${tz}" ${profile.timezone===tz?'selected':''}>${tz.replace('America/','').replace('_',' ')}</option>`).join('')}
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Currency Display</label>
                <select id="p-currency" class="form-select">
                  <option value="USD" ${(settings.currency||'USD')==='USD'?'selected':''}>USD ($)</option>
                  <option value="EUR" ${settings.currency==='EUR'?'selected':''}>EUR (€)</option>
                  <option value="GBP" ${settings.currency==='GBP'?'selected':''}>GBP (£)</option>
                </select>
              </div>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()" style="margin-top:8px">Save Changes</button>
          </div>

          <div class="settings-section">
            <h3 style="font-size:15px;font-weight:600;margin-bottom:20px">Change Password</h3>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" id="p-newpass" class="form-input" placeholder="Min. 8 characters">
              </div>
              <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" id="p-confirmpass" class="form-input" placeholder="Repeat password">
              </div>
            </div>
            <div class="form-error" id="pass-error" style="margin-bottom:8px"></div>
            <button class="btn btn-secondary" onclick="changePassword()">Update Password</button>
          </div>

          <div class="danger-zone">
            <h3 style="font-size:15px;font-weight:600;color:var(--red);margin-bottom:8px">Danger Zone</h3>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">Once you delete your account, all data will be permanently removed. This action cannot be undone.</p>
            <button class="btn btn-danger" onclick="confirmDeleteAccount()">Delete My Account</button>
          </div>`
      }

      if (tab === 'notifications') {
        const notifSettings = settings.notification_settings || {}
        const rows = [
          { key: 'low_stock', label: 'Low Stock Alerts', desc: 'Get notified when products fall below reorder point', default: true },
          { key: 'shipment_updates', label: 'Shipment Updates', desc: 'Receive updates when shipment status changes', default: true },
          { key: 'customs_alerts', label: 'Customs Alerts', desc: 'Alert when a shipment enters or clears customs', default: true },
          { key: 'tariff_changes', label: 'Tariff Rate Changes', desc: 'Notify when HTS code tariff rates change', default: true },
          { key: 'reorder_suggestions', label: 'Reorder Suggestions', desc: 'AI-generated reorder recommendations', default: true },
          { key: 'po_reminders', label: 'PO Reminders', desc: 'Remind when purchase orders are overdue', default: false },
          { key: 'weekly_digest', label: 'Weekly Summary', desc: 'Weekly email digest with business overview', default: false },
        ]
        document.getElementById('tab-content').innerHTML = `
          <div class="settings-section">
            <h3 style="font-size:15px;font-weight:600;margin-bottom:4px">Notification Preferences</h3>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">Control which alerts and notifications you receive from Supploxi.</p>
            ${rows.map(r => `
              <div class="toggle-row">
                <div>
                  <div class="toggle-label">${r.label}</div>
                  <div class="toggle-desc">${r.desc}</div>
                </div>
                <label class="toggle">
                  <input type="checkbox" id="notif-${r.key}" ${(notifSettings[r.key]??r.default)?'checked':''} onchange="saveNotifications()">
                  <span class="toggle-slider"></span>
                </label>
              </div>`).join('')}
          </div>`
      }

      if (tab === 'preferences') {
        document.getElementById('tab-content').innerHTML = `
          <div class="settings-section">
            <h3 style="font-size:15px;font-weight:600;margin-bottom:20px">Business Preferences</h3>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Default Lead Time Buffer (days)</label>
                <input type="number" id="pref-buffer" class="form-input" value="${settings.customs_buffer_days||15}" placeholder="15">
                <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Added to supplier lead time for US customs clearance estimate</div>
              </div>
              <div class="form-group">
                <label class="form-label">Safety Stock Buffer (days)</label>
                <input type="number" id="pref-safety" class="form-input" value="${settings.safety_stock_days||7}" placeholder="7">
                <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Extra days of stock to keep as safety buffer</div>
              </div>
              <div class="form-group">
                <label class="form-label">Default Shipping Country Origin</label>
                <select id="pref-origin" class="form-select">
                  <option value="CN" ${(settings.default_origin||'CN')==='CN'?'selected':''}>China</option>
                  <option value="IN" ${settings.default_origin==='IN'?'selected':''}>India</option>
                  <option value="VN" ${settings.default_origin==='VN'?'selected':''}>Vietnam</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Low Margin Alert Threshold (%)</label>
                <input type="number" id="pref-margin" class="form-input" value="${settings.low_margin_threshold||20}" placeholder="20">
                <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Alert when product margin falls below this %</div>
              </div>
            </div>
            <button class="btn btn-primary" onclick="savePreferences()" style="margin-top:8px">Save Preferences</button>
          </div>

          <div class="settings-section">
            <h3 style="font-size:15px;font-weight:600;margin-bottom:20px">AI Reorder Engine</h3>
            <div class="toggle-row">
              <div>
                <div class="toggle-label">Enable AI Reorder Alerts</div>
                <div class="toggle-desc">Get proactive recommendations when stock is running low</div>
              </div>
              <label class="toggle">
                <input type="checkbox" id="pref-ai" ${settings.ai_reorder_enabled!==false?'checked':''} onchange="savePreferences()">
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div class="toggle-row">
              <div>
                <div class="toggle-label">Include US Customs Buffer in Calculations</div>
                <div class="toggle-desc">Automatically add ${settings.customs_buffer_days||15} days for US customs clearance in reorder calculations</div>
              </div>
              <label class="toggle">
                <input type="checkbox" id="pref-customs" ${settings.include_customs_buffer!==false?'checked':''} onchange="savePreferences()">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>`
      }

      if (tab === 'billing') {
        const trackUsed = settings.tracking_count_month || 0
        const trackLimit = settings.monthly_tracking_limit || 999
        const trackPct = Math.min(100, Math.round(trackUsed / trackLimit * 100))

        document.getElementById('tab-content').innerHTML = `
          <div class="settings-section">
            <div class="plan-card" style="margin-bottom:24px">
              <div style="font-size:13px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Current Plan</div>
              <div style="font-size:42px;font-weight:700;margin-bottom:4px">Beta <span style="color:var(--green)">Free</span></div>
              <div style="font-size:14px;color:var(--text-muted);margin-bottom:20px">Full access during beta period · No credit card required</div>
              <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);border-radius:20px;padding:8px 20px;">
                <span style="width:8px;height:8px;border-radius:50%;background:var(--green)"></span>
                <span style="font-size:13px;font-weight:600">Active until: Beta ends</span>
              </div>
            </div>

            <!-- Tracking Usage -->
            <div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:24px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                <h3 style="font-size:14px;font-weight:600">Tracking Usage This Month</h3>
                <span style="font-size:13px;color:var(--text-muted)">${trackUsed} / ${trackLimit} lookups</span>
              </div>
              <div style="background:var(--border);border-radius:4px;height:8px;overflow:hidden">
                <div style="background:${trackPct>80?'var(--orange)':trackPct>95?'var(--red)':'var(--green)'};height:100%;width:${trackPct}%;border-radius:4px;transition:width 0.3s"></div>
              </div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:6px">Resets on the 1st of each month</div>
            </div>

            <h3 style="font-size:15px;font-weight:600;margin-bottom:16px">What's included in Beta</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px">
              ${['Unlimited suppliers','Unlimited products','Auto shipment tracking','AI Reorder Engine','Tariff Tracker','Financials & Reports','Store Integrations','Priority support'].map(f => `
                <div style="display:flex;align-items:center;gap:8px;font-size:13px">
                  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l4 4 6-7"/></svg> ${f}
                </div>`).join('')}
            </div>

            <div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius);padding:20px">
              <h3 style="font-size:14px;font-weight:600;margin-bottom:8px">Coming Soon — Paid Plans</h3>
              <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">After beta, Supploxi will offer flexible plans. Beta users will get a special discount.</p>
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
                ${[
                  ['Starter','$19','5 suppliers','50 trackings/mo'],
                  ['Growth','$49','20 suppliers','200 trackings/mo'],
                  ['Scale','$99','Unlimited suppliers','500 trackings/mo']
                ].map(([name,price,sup,track]) => `
                  <div style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:20px;text-align:center">
                    <div style="font-weight:600;margin-bottom:6px">${name}</div>
                    <div style="font-size:28px;font-weight:700;color:var(--green);margin-bottom:2px">${price}<span style="font-size:14px;font-weight:400;color:var(--text-muted)">/mo</span></div>
                    <div style="display:flex;flex-direction:column;gap:6px;margin-top:12px;font-size:12px;text-align:left">
                      <div style="display:flex;align-items:center;gap:6px"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round"><path d="M3 8l4 4 6-7"/></svg> ${sup}</div>
                      <div style="display:flex;align-items:center;gap:6px"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round"><path d="M3 8l4 4 6-7"/></svg> <strong>${track}</strong></div>
                      <div style="display:flex;align-items:center;gap:6px"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round"><path d="M3 8l4 4 6-7"/></svg> AI Reorder Engine</div>
                      <div style="display:flex;align-items:center;gap:6px"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round"><path d="M3 8l4 4 6-7"/></svg> Tariff Tracker</div>
                    </div>
                  </div>`).join('')}
              </div>
            </div>
          </div>`
      }
    }

    async function saveProfile() {
      const user = await window.getUser()
      const { error } = await window._sb.from('user_profiles').upsert({
        user_id: user.id,
        full_name: document.getElementById('p-name').value.trim(),
        company_name: document.getElementById('p-company').value.trim(),
        phone: document.getElementById('p-phone').value.trim(),
        timezone: document.getElementById('p-timezone').value
      })
      await window._sb.from('user_settings').upsert({ user_id: user.id, currency: document.getElementById('p-currency').value })
      if (error) { window.showToast('Error: ' + error.message, 'error'); return }
      window.showToast('Profile saved!', 'success')
    }

    async function changePassword() {
      const newpass = document.getElementById('p-newpass').value
      const confirm = document.getElementById('p-confirmpass').value
      const errEl = document.getElementById('pass-error')
      if (newpass.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; return }
      if (newpass !== confirm) { errEl.textContent = 'Passwords do not match.'; return }
      const { error } = await window._sb.auth.updateUser({ password: newpass })
      if (error) { errEl.textContent = error.message; return }
      errEl.textContent = ''
      window.showToast('Password updated!', 'success')
      document.getElementById('p-newpass').value = ''
      document.getElementById('p-confirmpass').value = ''
    }

    async function saveNotifications() {
      const user = await window.getUser()
      const keys = ['low_stock','shipment_updates','customs_alerts','tariff_changes','reorder_suggestions','po_reminders','weekly_digest']
      const notif = {}
      keys.forEach(k => { notif[k] = document.getElementById('notif-'+k)?.checked ?? true })
      await window._sb.from('user_settings').upsert({ user_id: user.id, notification_settings: notif })
    }

    async function savePreferences() {
      const user = await window.getUser()
      await window._sb.from('user_settings').upsert({
        user_id: user.id,
        customs_buffer_days: parseInt(document.getElementById('pref-buffer')?.value)||15,
        safety_stock_days: parseInt(document.getElementById('pref-safety')?.value)||7,
        default_origin: document.getElementById('pref-origin')?.value||'CN',
        low_margin_threshold: parseInt(document.getElementById('pref-margin')?.value)||20,
        ai_reorder_enabled: document.getElementById('pref-ai')?.checked??true,
        include_customs_buffer: document.getElementById('pref-customs')?.checked??true
      })
      window.showToast('Preferences saved!', 'success')
    }

    async function confirmDeleteAccount() {
      if (!confirm('Are you absolutely sure? All your data will be permanently deleted.')) return
      if (!confirm('This is IRREVERSIBLE. Type OK to confirm.')) return
      await window._sb.auth.signOut()
      window.location.href = '/'
    }

    load()
  </script>
</body>
</html>
