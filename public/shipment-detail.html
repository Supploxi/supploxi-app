<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supploxi — Shipment Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .tracking-timeline { display:flex; flex-direction:column; gap:0; }
    .timeline-item { display:flex; gap:16px; position:relative; padding-bottom:20px; }
    .timeline-item:last-child { padding-bottom:0; }
    .timeline-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; margin-top:4px; z-index:1; }
    .timeline-line { position:absolute; left:5px; top:16px; bottom:0; width:2px; background:var(--border); }
    .timeline-item:last-child .timeline-line { display:none; }
    .timeline-item.latest .timeline-dot { width:16px; height:16px; margin-top:2px; margin-left:-2px; box-shadow:0 0 0 4px var(--green-dim); }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="page-content">
      <div id="shipment-content">
        <div class="empty-state"><div class="spinner"></div><p style="margin-top:12px">Loading shipment...</p></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/business-logic.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    const shipId = new URLSearchParams(location.search).get('id')
    let shipment = null

    const PROGRESS_STEPS = [
      { key: 'processing', icon: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3h8a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M6 7h4M6 10h2"/></svg>', label: 'Processed' },
      { key: 'in_transit', icon: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12L8 4l6 8"/><path d="M5 10v4h6v-4"/></svg>', label: 'In Transit' },
      { key: 'customs', icon: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1.5l6 3v7l-6 3-6-3v-7z"/><path d="M8 7.5v6"/></svg>', label: 'Customs' },
      { key: 'out_for_delivery', icon: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="13" r="1.5"/><circle cx="12" cy="13" r="1.5"/><path d="M1 1h2l1.5 8h8L14 4H5"/></svg>', label: 'Out for Delivery' },
      { key: 'delivered', icon: '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l4 4 6-7"/></svg>', label: 'Delivered' }
    ]

    async function load() {
      const user = await window.requireAuth()
      await window.initLayout({ page: 'shipments', title: 'Shipment Detail' })
      if (!shipId) { window.location.href = '/shipments.html'; return }

      const { data: s } = await window._sb.from('shipments').select('*, suppliers(company_name), purchase_orders(po_number)').eq('id', shipId).eq('user_id', user.id).single()
      if (!s) { window.location.href = '/shipments.html'; return }
      shipment = s

      // Atualiza days_in_transit
      if (s.ship_date) {
        const days = Math.floor((new Date() - new Date(s.ship_date)) / 86400000)
        if (days !== s.days_in_transit) {
          await window._sb.from('shipments').update({ days_in_transit: days }).eq('id', shipId)
          shipment.days_in_transit = days
        }
      }

      const { data: events } = await window._sb.from('tracking_events').select('*').eq('shipment_id', shipId).order('event_time', { ascending: false })

      render(events || [])
    }

    function render(events) {
      const s = shipment
      const stepIdx = PROGRESS_STEPS.findIndex(p => p.key === s.status)
      const totalCost = (s.shipping_cost||0) + (s.insurance_cost||0) + (s.customs_duty||0)
      const lastSync = s.last_synced_at ? window.formatRelativeTime(s.last_synced_at) : 'Never'

      const progressHtml = PROGRESS_STEPS.map((step, i) => `
        <div class="progress-step ${i < stepIdx ? 'done' : i === stepIdx ? 'active' : ''}">
          ${i < PROGRESS_STEPS.length - 1 ? '<div class="progress-step-line"></div>' : ''}
          <div class="progress-step-dot">${i <= stepIdx ? step.icon : i + 1}</div>
          <div class="progress-step-label">${step.label}</div>
        </div>`).join('')

      const timelineHtml = events.length ? events.map((ev, i) => `
        <div class="timeline-item ${i===0?'latest':''}">
          <div class="timeline-line"></div>
          <div class="timeline-dot" style="background:${i===0?'var(--green)':s.status==='exception'?'var(--red)':'var(--border-light)'}"></div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:${i===0?'600':'400'}">${window.escapeHtml(ev.description||'Status update')}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:2px">
              ${ev.location ? `${window.escapeHtml(ev.location)} · ` : ''}
              ${ev.event_time ? new Date(ev.event_time).toLocaleString('en-US') : ''}
            </div>
          </div>
        </div>`).join('') :
        `<div class="empty-state" style="padding:20px"><p>No tracking events yet. Auto-sync runs every 3 hours.</p></div>`

      document.getElementById('shipment-content').innerHTML = `
        <!-- HEADER -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap">
          <div>
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
              <h1 style="font-size:20px;font-weight:700;font-family:monospace">${window.escapeHtml(s.tracking_number)}</h1>
              ${window.getStatusBadge(s.status)}
            </div>
            <div style="font-size:13px;color:var(--text-muted);margin-top:4px">
              ${window.escapeHtml(s.suppliers?.company_name||'—')} · Last updated: ${lastSync}
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary" onclick="window.location.href='/shipments.html'">← Back</button>
            <button class="btn btn-secondary" onclick="refreshTracking()" id="refresh-btn">Refresh Tracking</button>
          </div>
        </div>

        <!-- PROGRESS -->
        <div class="card" style="margin-bottom:24px">
          <div class="shipment-progress">${progressHtml}</div>
        </div>

        <!-- INFO CARDS -->
        <div class="stats-grid" style="margin-bottom:24px">
          <div class="stat-card"><div class="stat-label">Ship Date</div><div class="stat-value" style="font-size:18px">${window.formatDate(s.ship_date)}</div></div>
          <div class="stat-card"><div class="stat-label">Est. Arrival</div><div class="stat-value" style="font-size:18px">${window.formatDate(s.estimated_arrival)}</div></div>
          <div class="stat-card"><div class="stat-label">Days in Transit</div><div class="stat-value">${s.days_in_transit||0}<span style="font-size:14px;font-weight:400"> days</span></div></div>
          <div class="stat-card"><div class="stat-label">Packages / Weight</div><div class="stat-value" style="font-size:18px">${s.num_packages||1} pkg${s.weight_kg?` / ${s.weight_kg}kg`:''}</div></div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 320px;gap:24px">
          <!-- TIMELINE -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">Tracking Timeline</span>
              <span style="font-size:12px;color:var(--green)">Auto-updates every 3h</span>
            </div>
            <div class="tracking-timeline">${timelineHtml}</div>
          </div>

          <!-- SIDEBAR -->
          <div>
            <!-- COSTS -->
            <div class="card" style="margin-bottom:16px">
              <div class="card-title" style="margin-bottom:16px">Cost Breakdown</div>
              <div style="display:flex;flex-direction:column;gap:8px;font-size:13px">
                <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Shipping</span><strong>${window.formatCurrency(s.shipping_cost||0)}</strong></div>
                <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Insurance</span><strong>${window.formatCurrency(s.insurance_cost||0)}</strong></div>
                <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Customs Duty</span><strong style="color:${(s.customs_duty||0)>0?'var(--orange)':'inherit'}">${window.formatCurrency(s.customs_duty||0)}</strong></div>
                <div style="height:1px;background:var(--border);margin:4px 0"></div>
                <div style="display:flex;justify-content:space-between"><span style="font-weight:600">Total</span><strong style="color:var(--green)">${window.formatCurrency(totalCost)}</strong></div>
              </div>
              ${s.customs_status ? `<div style="margin-top:12px;padding:8px;background:var(--orange-dim);border-radius:var(--radius-sm);font-size:12px;color:var(--orange)">Customs: ${window.escapeHtml(s.customs_status)}</div>` : ''}
            </div>

            <!-- DETAILS -->
            <div class="card">
              <div class="card-title" style="margin-bottom:16px">Details</div>
              <div style="display:flex;flex-direction:column;gap:8px;font-size:13px">
                <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Carrier</span><strong>${window.escapeHtml(s.carrier_detected||s.carrier||'Auto')}</strong></div>
                <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Method</span><strong>${window.escapeHtml(s.shipping_method||'—')}</strong></div>
                <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Origin</span><strong>${window.getCountryFlag(s.origin_country||'CN')} ${s.origin_country||'CN'}</strong></div>
                <div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Destination</span><strong>${window.getCountryFlag('US')} US${s.destination_state?' ('+s.destination_state+')':''}</strong></div>
                ${s.purchase_orders ? `<div style="display:flex;justify-content:space-between"><span style="color:var(--text-muted)">Linked PO</span><a href="/po-detail.html?id=${s.po_id}" style="color:var(--green)">${s.purchase_orders.po_number}</a></div>` : ''}
              </div>
              ${s.notes ? `<div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px;font-size:12px;color:var(--text-muted)">${window.escapeHtml(s.notes)}</div>` : ''}
            </div>
          </div>
        </div>`
    }

    async function refreshTracking() {
      const btn = document.getElementById('refresh-btn')
      btn.textContent = 'Refreshing...'
      btn.disabled = true
      try {
        const user = await window.getUser()
        const res = await fetch('/api/tracking/getinfo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ numbers: [shipment.tracking_number], user_id: user.id })
        })
        if (res.status === 429) {
          const err = await res.json()
          window.showToast(`Monthly tracking limit reached (${err.used}/${err.limit}). Upgrade your plan for more.`, 'warning')
          btn.textContent = 'Refresh Tracking'
          btn.disabled = false
          return
        }
        const data = await res.json()

        // Debug: log full response to help diagnose parsing issues
        console.log('[Tracking] Full API response:', JSON.stringify(data, null, 2))

        const accepted = data?.data?.accepted
        if (accepted?.length > 0) {
          const result = accepted[0]
          const trackInfo = result.track_info

          console.log('[Tracking] track_info keys:', Object.keys(trackInfo || {}))
          console.log('[Tracking] latest_status:', JSON.stringify(trackInfo?.latest_status))
          console.log('[Tracking] latest_event:', JSON.stringify(trackInfo?.latest_event))

          if (!trackInfo) {
            window.showToast('No tracking data available yet.', 'info')
            btn.textContent = 'Refresh Tracking'
            btn.disabled = false
            return
          }

          // Status from track_info.latest_status.status (string: "InTransit", "Delivered", etc.)
          const statusStr = trackInfo.latest_status?.status || ''
          const subStatus = trackInfo.latest_status?.sub_status || ''
          // Check sub_status for customs hold before general mapping
          const newStatus = subStatus.includes('CustomsHold') ? 'customs' : window.map17TrackStatus(statusStr)
          console.log('[Tracking] Mapped status:', { apiStatus: statusStr, subStatus, result: newStatus })

          // Events from track_info.tracking.providers[0].events
          const events = trackInfo.tracking?.providers?.[0]?.events || []
          const latestEvent = trackInfo.latest_event || events[0] || null
          console.log('[Tracking] Events count:', events.length)

          // Save events to tracking_events table
          if (events.length > 0) {
            await window._sb.from('tracking_events').delete().eq('shipment_id', shipId)
            const { error: insertErr } = await window._sb.from('tracking_events').insert(events.map(ev => ({
              shipment_id: shipId,
              event_time: ev.time_iso ? new Date(ev.time_iso).toISOString() : new Date().toISOString(),
              location: ev.location || '',
              description: ev.description || '',
              status_code: ev.stage || statusStr
            })))
            if (insertErr) console.error('[Tracking] Error saving events:', insertErr.message)
          }

          // Update shipment record
          const updateData = {
            status: newStatus,
            last_synced_at: new Date().toISOString()
          }
          if (latestEvent) {
            updateData.last_event = latestEvent.description || ''
            updateData.last_event_location = latestEvent.location || ''
          }
          const providerName = trackInfo.tracking?.providers?.[0]?.provider?.name
          if (providerName) {
            updateData.carrier_detected = providerName
          }

          const { error: updateErr } = await window._sb.from('shipments').update(updateData).eq('id', shipId)
          if (updateErr) console.error('[Tracking] Error updating shipment:', updateErr.message)

          window.showToast(events.length > 0 ? 'Tracking updated!' : 'Status updated, no new events yet.', 'success')
        } else {
          const rejected = data?.data?.rejected
          if (rejected?.length > 0) {
            console.log('[Tracking] Rejected:', JSON.stringify(rejected))
            window.showToast('Tracking number not recognized by carrier yet.', 'warning')
          } else {
            window.showToast('No tracking data found. Try again later.', 'info')
          }
        }
      } catch(e) {
        console.error('[Tracking] Error:', e)
        window.showToast('Error refreshing: ' + e.message, 'error')
      }
      btn.textContent = 'Refresh Tracking'
      btn.disabled = false
      await load()
    }

    load()
  </script>
</body>
</html>
