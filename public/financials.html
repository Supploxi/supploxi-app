<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supploxi — Financials</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .fin-section { margin-bottom:32px; }
    .breakdown-bar { height:20px; border-radius:4px; overflow:hidden; display:flex; background:var(--border); margin:12px 0; }
    .breakdown-segment { height:100%; transition:width 0.5s; }
    .legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .metric-big { font-size:36px; font-weight:700; }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="page-content">

      <div class="tabs">
        <div class="tab active" onclick="switchTab('overview',this)">📊 Overview</div>
        <div class="tab" onclick="switchTab('cogs',this)">💰 COGS Breakdown</div>
        <div class="tab" onclick="switchTab('customs',this)">🛃 Customs & Duties</div>
        <div class="tab" onclick="switchTab('products',this)">📦 By Product</div>
      </div>

      <div id="tab-content">
        <div class="empty-state"><div class="spinner"></div></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/business-logic.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let products = [], orders = [], shipments = []

    async function load() {
      const user = await window.requireAuth()
      await window.initLayout({ page: 'financials', title: 'Financials' })
      const [{ data: p }, { data: o }, { data: s }] = await Promise.all([
        window._sb.from('products').select('*').eq('user_id', user.id),
        window._sb.from('purchase_orders').select('*').eq('user_id', user.id),
        window._sb.from('shipments').select('*').eq('user_id', user.id)
      ])
      products = p || []
      orders = o || []
      shipments = s || []
      switchTab('overview', document.querySelector('.tab'))
    }

    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      if (el) el.classList.add('active')

      const totalCOGS = products.reduce((a,p) => a + (p.stock_quantity||0)*(p.cost_price||0), 0)
      const totalShipping = shipments.reduce((a,s) => a+(s.shipping_cost||0), 0)
      const totalDuties = shipments.reduce((a,s) => a+(s.customs_duty||0), 0)
      const totalSpend = orders.reduce((a,o) => a+(o.total_value||0), 0)
      const totalLanded = products.reduce((a,p) => a+(p.stock_quantity||0)*(p.landed_cost||0), 0)
      const avgMargin = products.length ? products.reduce((a,p)=>a+(p.margin_percent||0),0)/products.length : 0

      if (tab === 'overview') {
        document.getElementById('tab-content').innerHTML = `
          <div class="stats-grid" style="margin-bottom:24px">
            <div class="stat-card"><div class="stat-label">Total Inventory Value</div><div class="stat-value">${window.formatCurrency(totalLanded)}</div><div class="stat-sub">At landed cost</div></div>
            <div class="stat-card"><div class="stat-label">Total PO Spend</div><div class="stat-value">${window.formatCurrency(totalSpend)}</div><div class="stat-sub">All purchase orders</div></div>
            <div class="stat-card"><div class="stat-label">Avg Gross Margin</div><div class="stat-value" style="color:${avgMargin>=40?'var(--green)':avgMargin>=20?'var(--orange)':'var(--red)'}">${avgMargin.toFixed(1)}%</div><div class="stat-sub">Across all products</div></div>
            <div class="stat-card"><div class="stat-label">Total Customs Paid</div><div class="stat-value">${window.formatCurrency(totalDuties)}</div><div class="stat-sub">Section 301 duties</div></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
            <div class="card">
              <div class="card-title" style="margin-bottom:20px">💸 Cost Structure</div>
              ${(() => {
                const total = totalCOGS + totalShipping + totalDuties || 1
                const cogsP = Math.round(totalCOGS/total*100)
                const shipP = Math.round(totalShipping/total*100)
                const dutyP = 100 - cogsP - shipP
                return `
                  <div class="breakdown-bar">
                    <div class="breakdown-segment" style="width:${cogsP}%;background:var(--green)"></div>
                    <div class="breakdown-segment" style="width:${shipP}%;background:var(--blue)"></div>
                    <div class="breakdown-segment" style="width:${dutyP}%;background:var(--orange)"></div>
                  </div>
                  <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">
                    <div style="display:flex;align-items:center;justify-content:space-between">
                      <div style="display:flex;align-items:center;gap:8px"><div class="legend-dot" style="background:var(--green)"></div><span style="font-size:13px">Product Cost (COGS)</span></div>
                      <div style="text-align:right"><strong>${window.formatCurrency(totalCOGS)}</strong><span style="font-size:11px;color:var(--text-muted);margin-left:6px">${cogsP}%</span></div>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between">
                      <div style="display:flex;align-items:center;gap:8px"><div class="legend-dot" style="background:var(--blue)"></div><span style="font-size:13px">Shipping Costs</span></div>
                      <div style="text-align:right"><strong>${window.formatCurrency(totalShipping)}</strong><span style="font-size:11px;color:var(--text-muted);margin-left:6px">${shipP}%</span></div>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between">
                      <div style="display:flex;align-items:center;gap:8px"><div class="legend-dot" style="background:var(--orange)"></div><span style="font-size:13px">Customs & Duties</span></div>
                      <div style="text-align:right"><strong>${window.formatCurrency(totalDuties)}</strong><span style="font-size:11px;color:var(--text-muted);margin-left:6px">${dutyP}%</span></div>
                    </div>
                    <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;justify-content:space-between">
                      <strong>Total Landed Cost</strong>
                      <strong style="color:var(--green)">${window.formatCurrency(totalCOGS+totalShipping+totalDuties)}</strong>
                    </div>
                  </div>`
              })()}
            </div>
            <div class="card">
              <div class="card-title" style="margin-bottom:20px">🏆 Top Products by Margin</div>
              ${[...products].sort((a,b) => (b.margin_percent||0)-(a.margin_percent||0)).slice(0,6).map(p => `
                <div style="margin-bottom:14px">
                  <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                    <span style="font-size:13px;font-weight:500">${window.escapeHtml(p.name)}</span>
                    <span style="font-size:13px;font-weight:700;color:${(p.margin_percent||0)>=40?'var(--green)':'var(--orange)'}">${(p.margin_percent||0).toFixed(1)}%</span>
                  </div>
                  <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(p.margin_percent||0,100)}%;background:${(p.margin_percent||0)>=40?'var(--green)':'var(--orange)'}"></div></div>
                </div>`).join('')}
            </div>
          </div>`
      }

      if (tab === 'cogs') {
        const bySupplier = {}
        orders.forEach(o => {
          if (!o.supplier_id) return
          if (!bySupplier[o.supplier_id]) bySupplier[o.supplier_id] = { name: o.supplier_id, value: 0, count: 0 }
          bySupplier[o.supplier_id].value += o.total_value || 0
          bySupplier[o.supplier_id].count++
        })
        const supplierList = Object.values(bySupplier).sort((a,b) => b.value-a.value)

        document.getElementById('tab-content').innerHTML = `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
            <div class="card">
              <div class="card-title" style="margin-bottom:20px">COGS by Category</div>
              ${(() => {
                const byCat = {}
                products.forEach(p => {
                  const cat = p.category || 'Uncategorized'
                  if (!byCat[cat]) byCat[cat] = 0
                  byCat[cat] += (p.stock_quantity||0) * (p.cost_price||0)
                })
                const cats = Object.entries(byCat).sort((a,b) => b[1]-a[1])
                const total = cats.reduce((a,c) => a+c[1], 0) || 1
                const colors = ['var(--green)','var(--blue)','var(--orange)','var(--purple)','var(--red)']
                return cats.map(([cat,val],i) => `
                  <div style="margin-bottom:12px">
                    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                      <span style="font-size:13px">${cat}</span>
                      <div><strong>${window.formatCurrency(val)}</strong> <span style="font-size:11px;color:var(--text-muted)">${Math.round(val/total*100)}%</span></div>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${val/total*100}%;background:${colors[i%colors.length]}"></div></div>
                  </div>`).join('') || '<p style="color:var(--text-muted)">No data yet</p>'
              })()}
            </div>
            <div class="card">
              <div class="card-title" style="margin-bottom:20px">Spend by Supplier</div>
              ${supplierList.length ? `
                <table style="width:100%">
                  <thead><tr><th style="text-align:left;padding:8px;font-size:12px;color:var(--text-muted)">Supplier</th><th style="text-align:left;padding:8px;font-size:12px;color:var(--text-muted)">Orders</th><th style="text-align:right;padding:8px;font-size:12px;color:var(--text-muted)">Total Spend</th></tr></thead>
                  <tbody>${supplierList.map(s => `<tr><td style="padding:8px;font-size:13px">${window.escapeHtml(s.name)}</td><td style="padding:8px;font-size:13px">${s.count}</td><td style="padding:8px;text-align:right"><strong>${window.formatCurrency(s.value)}</strong></td></tr>`).join('')}</tbody>
                </table>` : '<p style="color:var(--text-muted)">No purchase orders yet</p>'}
            </div>
          </div>`
      }

      if (tab === 'customs') {
        const withDuties = shipments.filter(s => s.customs_duty > 0)
        const totalDuty = withDuties.reduce((a,s) => a+(s.customs_duty||0), 0)
        const avgDuty = withDuties.length ? totalDuty/withDuties.length : 0
        const dutyToShipping = totalShipping ? ((totalDuties/totalShipping)*100).toFixed(1) : 0

        document.getElementById('tab-content').innerHTML = `
          <div class="stats-grid" style="margin-bottom:24px">
            <div class="stat-card"><div class="stat-label">Total Duties Paid</div><div class="stat-value">${window.formatCurrency(totalDuties)}</div></div>
            <div class="stat-card"><div class="stat-label">Shipments with Duties</div><div class="stat-value">${withDuties.length}</div></div>
            <div class="stat-card"><div class="stat-label">Avg Duty per Shipment</div><div class="stat-value">${window.formatCurrency(avgDuty)}</div></div>
            <div class="stat-card"><div class="stat-label">Duty as % of Shipping</div><div class="stat-value">${dutyToShipping}%</div></div>
          </div>
          <div class="card">
            <div class="card-title" style="margin-bottom:4px">🛃 Customs Clearance History</div>
            <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px">Duties are recorded when you update shipment costs. Use the Tariff Tracker for proactive monitoring.</p>
            ${withDuties.length ? `
              <table>
                <thead><tr><th>Tracking #</th><th>Ship Date</th><th>Status</th><th>Customs Status</th><th>Duty Paid</th><th>Shipping Cost</th></tr></thead>
                <tbody>
                  ${withDuties.map(s => `<tr>
                    <td><strong style="font-family:monospace">${window.escapeHtml(s.tracking_number)}</strong></td>
                    <td>${window.formatDate(s.ship_date)}</td>
                    <td>${window.getStatusBadge(s.status)}</td>
                    <td style="font-size:12px;color:var(--text-muted)">${s.customs_status||'Cleared'}</td>
                    <td style="color:var(--orange)"><strong>${window.formatCurrency(s.customs_duty)}</strong></td>
                    <td>${window.formatCurrency(s.shipping_cost||0)}</td>
                  </tr>`).join('')}
                </tbody>
              </table>` : `
              <div class="empty-state" style="padding:30px">
                <div class="empty-state-icon">🛃</div>
                <h3>No customs data yet</h3>
                <p>Customs duties will appear here when recorded on shipments</p>
                <a href="/tariffs.html" class="btn btn-primary" style="margin-top:8px">Go to Tariff Tracker →</a>
              </div>`}
          </div>`
      }

      if (tab === 'products') {
        const sorted = [...products].sort((a,b) => (b.margin_percent||0)-(a.margin_percent||0))
        document.getElementById('tab-content').innerHTML = `
          <div class="table-container">
            <table>
              <thead><tr><th>Product</th><th>Selling Price</th><th>Cost Price</th><th>Shipping Est.</th><th>Duties Est.</th><th>Landed Cost</th><th>Gross Margin</th><th>Stock Value</th></tr></thead>
              <tbody>
                ${sorted.map(p => {
                  const m = p.margin_percent || 0
                  const mColor = m >= 40 ? 'var(--green)' : m >= 20 ? 'var(--orange)' : 'var(--red)'
                  const stockVal = (p.stock_quantity||0) * (p.landed_cost||p.cost_price||0)
                  return `<tr>
                    <td><strong>${window.escapeHtml(p.name)}</strong><div style="font-size:11px;color:var(--text-muted)">${p.sku||''}</div></td>
                    <td>${window.formatCurrency(p.selling_price)}</td>
                    <td>${window.formatCurrency(p.cost_price)}</td>
                    <td>${window.formatCurrency(p.shipping_cost_estimate)}</td>
                    <td>${window.formatCurrency(p.duties_estimate)}</td>
                    <td><strong style="color:var(--orange)">${window.formatCurrency(p.landed_cost)}</strong></td>
                    <td><strong style="color:${mColor}">${m.toFixed(1)}%</strong></td>
                    <td>${window.formatCurrency(stockVal)}</td>
                  </tr>`
                }).join('')}
              </tbody>
            </table>
          </div>`
      }
    }

    load()
  </script>
</body>
</html>
