<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supploxi — Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .computed-field { background:var(--bg-primary); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px 12px; font-size:14px; font-weight:600; }
    .action-btns { display:flex; gap:6px; opacity:0; transition:opacity 0.15s; }
    tr:hover .action-btns { opacity:1; }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="page-content">

      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Products</div><div class="stat-value" id="stat-total">—</div><div class="stat-sub">Active SKUs</div></div>
        <div class="stat-card"><div class="stat-label">Low Stock</div><div class="stat-value" id="stat-low">—</div><div class="stat-sub" id="stat-low-sub">Need attention</div></div>
        <div class="stat-card"><div class="stat-label">Out of Stock</div><div class="stat-value" id="stat-out">—</div><div class="stat-sub red">Urgent</div></div>
        <div class="stat-card"><div class="stat-label">Avg Margin</div><div class="stat-value" id="stat-margin">—</div><div class="stat-sub">Gross margin</div></div>
      </div>

      <div class="table-container">
        <div class="table-header">
          <div class="search-wrapper" style="flex:1">
            <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" class="search-input" id="search" placeholder="Search products or SKU..." oninput="renderTable()">
          </div>
          <select class="form-select" style="width:140px" id="filter-cat" onchange="renderTable()">
            <option value="">All Categories</option>
            <option>Electronics</option>
            <option>Apparel & Fashion</option>
            <option>Home & Garden</option>
            <option>Sports & Outdoors</option>
            <option>Health & Beauty</option>
            <option>Toys & Games</option>
          </select>
          <select class="form-select" style="width:140px" id="filter-stock" onchange="renderTable()">
            <option value="">All Stock</option>
            <option value="ok">In Stock</option>
            <option value="low">Low Stock</option>
            <option value="out">Out of Stock</option>
          </select>
          <button class="btn btn-primary" onclick="openModal()">+ Add Product</button>
        </div>
        <div id="table-body">
          <div class="empty-state"><div class="empty-state-icon">--</div><h3>No products yet</h3><p>Add your first product to start tracking inventory and margins</p><button class="btn btn-primary" onclick="openModal()">+ Add Product</button></div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL ADD/EDIT -->
  <div class="modal-overlay" id="modal">
    <div class="modal" style="max-width:680px">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Add Product</span>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="form-grid">
          <div class="form-group" style="grid-column:1/-1">
            <label class="form-label">Product Name <span class="required">*</span></label>
            <input type="text" id="f-name" class="form-input" placeholder="Premium Yoga Mat">
          </div>
          <div class="form-group">
            <label class="form-label">SKU</label>
            <input type="text" id="f-sku" class="form-input" placeholder="YM-001-BLK">
          </div>
          <div class="form-group">
            <label class="form-label">Barcode</label>
            <input type="text" id="f-barcode" class="form-input" placeholder="012345678901">
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="f-category" class="form-select">
              <option value="">Select category</option>
              <option>Electronics</option>
              <option>Apparel & Fashion</option>
              <option>Home & Garden</option>
              <option>Sports & Outdoors</option>
              <option>Health & Beauty</option>
              <option>Toys & Games</option>
              <option>Pet Supplies</option>
              <option>Auto & Industrial</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Primary Supplier</label>
            <select id="f-supplier" class="form-select">
              <option value="">No supplier</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">HTS Code (for tariff tracking)</label>
            <input type="text" id="f-hts" class="form-input" placeholder="e.g. 9506.91.0030">
          </div>
          <div class="form-group">
            <label class="form-label">Weight (kg)</label>
            <input type="number" id="f-weight" class="form-input" placeholder="0.5" step="0.01">
          </div>
        </div>

        <div style="border-top:1px solid var(--border);margin:16px 0;padding-top:16px">
          <div style="font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px">Pricing & Margins</div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Selling Price (USD) <span class="required">*</span></label>
              <input type="number" id="f-sell" class="form-input" placeholder="29.99" step="0.01" oninput="calcLive()">
            </div>
            <div class="form-group">
              <label class="form-label">Cost Price from Supplier (USD)</label>
              <input type="number" id="f-cost" class="form-input" placeholder="8.50" step="0.01" oninput="calcLive()">
            </div>
            <div class="form-group">
              <label class="form-label">Est. Shipping Cost (USD)</label>
              <input type="number" id="f-shipping" class="form-input" placeholder="1.50" step="0.01" oninput="calcLive()">
            </div>
            <div class="form-group">
              <label class="form-label">Est. Customs/Duties (USD)</label>
              <input type="number" id="f-duties" class="form-input" placeholder="0.80" step="0.01" oninput="calcLive()">
            </div>
            <div class="form-group">
              <label class="form-label">Landed Cost (calculated)</label>
              <div class="computed-field" id="c-landed" style="color:var(--orange)">$0.00</div>
            </div>
            <div class="form-group">
              <label class="form-label">Gross Margin (calculated)</label>
              <div class="computed-field" id="c-margin">0.0%</div>
            </div>
          </div>
        </div>

        <div style="border-top:1px solid var(--border);margin:16px 0;padding-top:16px">
          <div style="font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px">Inventory & Reorder</div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Current Stock (units)</label>
              <input type="number" id="f-stock" class="form-input" placeholder="0" value="0">
            </div>
            <div class="form-group">
              <label class="form-label">Reorder Point (units)</label>
              <input type="number" id="f-reorder" class="form-input" placeholder="10" value="10">
            </div>
            <div class="form-group">
              <label class="form-label">Reorder Quantity (units)</label>
              <input type="number" id="f-reorder-qty" class="form-input" placeholder="50" value="50">
            </div>
            <div class="form-group">
              <label class="form-label">Avg Daily Sales (units)</label>
              <input type="number" id="f-daily" class="form-input" placeholder="1" value="1" step="0.1">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Notes</label>
          <textarea id="f-notes" class="form-textarea" placeholder="Product specs, variations, important notes..."></textarea>
        </div>
        <div class="form-error" id="modal-error"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveProduct()" id="save-btn">Save Product</button>
      </div>
    </div>
  </div>

  <!-- DELETE MODAL -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <span class="modal-title">Delete Product</span>
        <button class="modal-close" onclick="closeDeleteModal()">×</button>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-muted)">Are you sure you want to delete <strong id="delete-name"></strong>?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/business-logic.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    let products = []
    let suppliers = []
    let deleteId = null

    async function load() {
      const user = await window.requireAuth()
      await window.initLayout({ page: 'products', title: 'Products' })
      const [{ data: p }, { data: s }] = await Promise.all([
        window._sb.from('products').select('*, suppliers(company_name)').eq('user_id', user.id).order('created_at', { ascending: false }),
        window._sb.from('suppliers').select('id,company_name,lead_time_days').eq('user_id', user.id).eq('status','active')
      ])
      products = p || []
      suppliers = s || []
      const sel = document.getElementById('f-supplier')
      sel.innerHTML = '<option value="">No supplier</option>' + suppliers.map(s => `<option value="${s.id}">${window.escapeHtml(s.company_name)}</option>`).join('')
      updateStats()
      renderTable()
    }

    function updateStats() {
      const low = products.filter(p => (p.stock_quantity||0) > 0 && (p.stock_quantity||0) <= (p.reorder_point||10)).length
      const out = products.filter(p => (p.stock_quantity||0) === 0).length
      const avgMargin = products.length ? products.reduce((a,p) => a+(p.margin_percent||0), 0)/products.length : 0
      document.getElementById('stat-total').textContent = products.length
      document.getElementById('stat-low').textContent = low
      document.getElementById('stat-out').textContent = out
      document.getElementById('stat-margin').textContent = avgMargin.toFixed(1) + '%'
    }

    function renderTable() {
      const q = document.getElementById('search').value.toLowerCase()
      const cat = document.getElementById('filter-cat').value
      const stockFilter = document.getElementById('filter-stock').value
      let list = products.filter(p => {
        if (q && !p.name.toLowerCase().includes(q) && !(p.sku||'').toLowerCase().includes(q)) return false
        if (cat && p.category !== cat) return false
        if (stockFilter === 'out' && (p.stock_quantity||0) !== 0) return false
        if (stockFilter === 'low' && !((p.stock_quantity||0) > 0 && (p.stock_quantity||0) <= (p.reorder_point||10))) return false
        if (stockFilter === 'ok' && (p.stock_quantity||0) <= (p.reorder_point||10)) return false
        return true
      })
      if (!list.length) {
        document.getElementById('table-body').innerHTML = `<div class="empty-state"><div class="empty-state-icon">--</div><h3>No products found</h3><p>Try adjusting your filters</p></div>`
        return
      }
      document.getElementById('table-body').innerHTML = `
        <table>
          <thead><tr>
            <th>Product</th><th>Supplier</th><th>Cost</th><th>Selling</th><th>Margin</th><th>Stock</th><th>AI Alert</th><th></th>
          </tr></thead>
          <tbody>
            ${list.map(p => {
              const stock = p.stock_quantity || 0
              const rp = p.reorder_point || 10
              const stockColor = stock === 0 ? 'var(--red)' : stock <= rp ? 'var(--orange)' : 'var(--green)'
              const stockLabel = stock === 0 ? 'Out of Stock' : stock <= rp ? 'Low Stock' : 'In Stock'
              const margin = p.margin_percent || 0
              const marginColor = margin >= 40 ? 'var(--green)' : margin >= 20 ? 'var(--orange)' : 'var(--red)'
              const supplierInfo = suppliers.find(s => s.id === p.primary_supplier_id)
              const alert = window.calcReorderAlert({ ...p, lead_time_days: supplierInfo?.lead_time_days || 30 })
              const alertBadge = alert.urgency === 'critical' ? '<span class="badge badge-red">CRITICAL</span>' : alert.urgency === 'soon' ? '<span class="badge badge-orange">SOON</span>' : alert.urgency === 'monitor' ? '<span class="badge badge-blue">MONITOR</span>' : '<span class="badge badge-green">OK</span>'
              return `<tr>
                <td>
                  <div style="font-weight:600">${window.escapeHtml(p.name)}</div>
                  <div style="font-size:12px;color:var(--text-muted)">${window.escapeHtml(p.sku||'—')}</div>
                </td>
                <td style="font-size:13px">${window.escapeHtml(p.suppliers?.company_name||'—')}</td>
                <td>${window.formatCurrency(p.cost_price)}</td>
                <td>${window.formatCurrency(p.selling_price)}</td>
                <td><strong style="color:${marginColor}">${margin.toFixed(1)}%</strong></td>
                <td>
                  <span style="font-weight:600;color:${stockColor}">${stock}</span>
                  <div style="font-size:11px;color:${stockColor}">${stockLabel}</div>
                </td>
                <td>${alertBadge}</td>
                <td onclick="event.stopPropagation()">
                  <div class="action-btns">
                    <button class="btn btn-sm btn-secondary btn-icon" onclick="editProduct('${p.id}')" title="Edit">Edit</button>
                    <button class="btn btn-sm btn-danger btn-icon" onclick="askDelete('${p.id}','${window.escapeHtml(p.name)}')" title="Delete">Del</button>
                  </div>
                </td>
              </tr>`
            }).join('')}
          </tbody>
        </table>`
    }

    function calcLive() {
      const sell = parseFloat(document.getElementById('f-sell').value) || 0
      const cost = parseFloat(document.getElementById('f-cost').value) || 0
      const ship = parseFloat(document.getElementById('f-shipping').value) || 0
      const duties = parseFloat(document.getElementById('f-duties').value) || 0
      const landed = window.calcLandedCost(cost, ship, duties)
      const margin = window.calcMargin(sell, landed)
      document.getElementById('c-landed').textContent = window.formatCurrency(landed)
      const mc = document.getElementById('c-margin')
      mc.textContent = margin.toFixed(1) + '%'
      mc.style.color = margin >= 40 ? 'var(--green)' : margin >= 20 ? 'var(--orange)' : 'var(--red)'
    }

    function openModal() { clearForm(); document.getElementById('modal').classList.add('active') }
    function closeModal() { document.getElementById('modal').classList.remove('active') }

    function clearForm() {
      document.getElementById('edit-id').value = ''
      document.getElementById('modal-title').textContent = 'Add Product'
      ;['f-name','f-sku','f-barcode','f-hts','f-notes'].forEach(id => document.getElementById(id).value = '')
      document.getElementById('f-sell').value = ''
      document.getElementById('f-cost').value = ''
      document.getElementById('f-shipping').value = ''
      document.getElementById('f-duties').value = ''
      document.getElementById('f-weight').value = ''
      document.getElementById('f-stock').value = 0
      document.getElementById('f-reorder').value = 10
      document.getElementById('f-reorder-qty').value = 50
      document.getElementById('f-daily').value = 1
      document.getElementById('f-supplier').value = ''
      document.getElementById('f-category').value = ''
      document.getElementById('c-landed').textContent = '$0.00'
      document.getElementById('c-margin').textContent = '0.0%'
      document.getElementById('modal-error').textContent = ''
    }

    function editProduct(id) {
      const p = products.find(x => x.id === id)
      if (!p) return
      clearForm()
      document.getElementById('modal-title').textContent = 'Edit Product'
      document.getElementById('edit-id').value = id
      document.getElementById('f-name').value = p.name || ''
      document.getElementById('f-sku').value = p.sku || ''
      document.getElementById('f-barcode').value = p.barcode || ''
      document.getElementById('f-hts').value = p.hts_code || ''
      document.getElementById('f-notes').value = p.notes || ''
      document.getElementById('f-sell').value = p.selling_price || ''
      document.getElementById('f-cost').value = p.cost_price || ''
      document.getElementById('f-shipping').value = p.shipping_cost_estimate || ''
      document.getElementById('f-duties').value = p.duties_estimate || ''
      document.getElementById('f-weight').value = p.weight_kg || ''
      document.getElementById('f-stock').value = p.stock_quantity || 0
      document.getElementById('f-reorder').value = p.reorder_point || 10
      document.getElementById('f-reorder-qty').value = p.reorder_quantity || 50
      document.getElementById('f-daily').value = p.avg_daily_sales || 1
      if (p.primary_supplier_id) document.getElementById('f-supplier').value = p.primary_supplier_id
      if (p.category) document.getElementById('f-category').value = p.category
      calcLive()
      document.getElementById('modal').classList.add('active')
    }

    async function saveProduct() {
      const name = document.getElementById('f-name').value.trim()
      if (!name) { document.getElementById('modal-error').textContent = 'Product name is required.'; return }
      const btn = document.getElementById('save-btn')
      btn.textContent = 'Saving...'
      btn.disabled = true
      const user = await window.getUser()
      const cost = parseFloat(document.getElementById('f-cost').value) || 0
      const ship = parseFloat(document.getElementById('f-shipping').value) || 0
      const duties = parseFloat(document.getElementById('f-duties').value) || 0
      const sell = parseFloat(document.getElementById('f-sell').value) || 0
      const landed = window.calcLandedCost(cost, ship, duties)
      const margin = window.calcMargin(sell, landed)
      const supplierId = document.getElementById('f-supplier').value || null
      const data = {
        user_id: user.id, name,
        sku: document.getElementById('f-sku').value.trim(),
        barcode: document.getElementById('f-barcode').value.trim(),
        hts_code: document.getElementById('f-hts').value.trim(),
        category: document.getElementById('f-category').value,
        selling_price: sell, cost_price: cost,
        shipping_cost_estimate: ship, duties_estimate: duties,
        landed_cost: landed, margin_percent: margin,
        stock_quantity: parseInt(document.getElementById('f-stock').value) || 0,
        reorder_point: parseInt(document.getElementById('f-reorder').value) || 10,
        reorder_quantity: parseInt(document.getElementById('f-reorder-qty').value) || 50,
        avg_daily_sales: parseFloat(document.getElementById('f-daily').value) || 1,
        weight_kg: parseFloat(document.getElementById('f-weight').value) || null,
        primary_supplier_id: supplierId,
        notes: document.getElementById('f-notes').value.trim()
      }
      const editId = document.getElementById('edit-id').value
      let error
      if (editId) {
        ({ error } = await window._sb.from('products').update(data).eq('id', editId))
      } else {
        ({ error } = await window._sb.from('products').insert(data))
      }
      btn.textContent = 'Save Product'
      btn.disabled = false
      if (error) { document.getElementById('modal-error').textContent = error.message; return }
      window.showToast(editId ? 'Product updated!' : 'Product added!', 'success')
      closeModal()
      await load()
    }

    function askDelete(id, name) { deleteId = id; document.getElementById('delete-name').textContent = name; document.getElementById('delete-modal').classList.add('active') }
    function closeDeleteModal() { document.getElementById('delete-modal').classList.remove('active'); deleteId = null }
    async function confirmDelete() {
      if (!deleteId) return
      const { error } = await window._sb.from('products').delete().eq('id', deleteId)
      if (error) { window.showToast('Error: ' + error.message, 'error'); return }
      window.showToast('Product deleted.', 'success')
      closeDeleteModal()
      await load()
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeDeleteModal() } })
    load()
  </script>
</body>
</html>
