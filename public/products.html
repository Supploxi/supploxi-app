<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supploxi — Products</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/layout.js"></script>
  <style>
    .product-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: .8rem;
      flex-shrink: 0;
      color: #fff;
    }
    .product-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .margin-green { color: #00d4aa; font-weight: 600; }
    .margin-yellow { color: #f59e0b; font-weight: 600; }
    .margin-red { color: #ff4757; font-weight: 600; }
    .stock-warning {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: .65rem;
      font-weight: 600;
      background: rgba(245,158,11,.15);
      color: #f59e0b;
      border: 1px solid rgba(245,158,11,.3);
      margin-left: 6px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .stock-out {
      background: rgba(255,71,87,.15);
      color: #ff4757;
      border-color: rgba(255,71,87,.3);
    }
    .actions-cell {
      display: flex;
      gap: 4px;
    }
    .form-section-title {
      font-size: .8rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin: 20px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .form-section-title:first-child { margin-top: 0; }
  </style>
</head>
<body>
  <div class="loading" id="loadingScreen">
    <div class="spinner"></div> Loading...
  </div>

  <div class="main" id="mainContent" style="display:none">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Products</div>
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-sub" id="statTotalSub">No products yet</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Low Stock</div>
        <div class="stat-value" id="statLow">0</div>
        <div class="stat-sub down" id="statLowSub">Items at or below reorder point</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Out of Stock</div>
        <div class="stat-value" id="statOut">0</div>
        <div class="stat-sub down" id="statOutSub">Items with zero stock</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Margin</div>
        <div class="stat-value" id="statMargin">0%</div>
        <div class="stat-sub" id="statMarginSub">Average product margin</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search products...">
      <select class="filter-select" id="filterCategory">
        <option value="">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Apparel">Apparel</option>
        <option value="Home & Garden">Home & Garden</option>
        <option value="Sports">Sports</option>
        <option value="Beauty">Beauty</option>
        <option value="Other">Other</option>
      </select>
      <select class="filter-select" id="filterSupplier">
        <option value="">All Suppliers</option>
      </select>
      <select class="filter-select" id="filterStock">
        <option value="">All Stock Status</option>
        <option value="in_stock">In Stock</option>
        <option value="low_stock">Low Stock</option>
        <option value="out_of_stock">Out of Stock</option>
      </select>
    </div>

    <!-- Products Table -->
    <div class="section">
      <div class="section-header">
        <h3>Products Catalog</h3>
        <button class="btn btn-primary" id="addProductBtn">+ Add Product</button>
      </div>
      <div id="productsTableWrap">
        <div class="loading"><div class="spinner"></div> Loading products...</div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Product Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal" style="max-width: 640px;">
      <div class="modal-header">
        <h3 id="modalTitle">Add Product</h3>
        <button class="modal-close" id="modalCloseBtn">&times;</button>
      </div>
      <div class="modal-body">
        <form id="productForm">
          <input type="hidden" id="productId">

          <div class="form-section-title" style="margin-top: 0;">Basic Information</div>

          <div class="form-row">
            <div class="form-group">
              <label for="productName">Product Name *</label>
              <input type="text" class="form-control" id="productName" required placeholder="Enter product name">
            </div>
            <div class="form-group">
              <label for="productSku">SKU</label>
              <input type="text" class="form-control" id="productSku" placeholder="e.g. SKU-001">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="productCategory">Category</label>
              <select class="form-control" id="productCategory">
                <option value="">Select category</option>
                <option value="Electronics">Electronics</option>
                <option value="Apparel">Apparel</option>
                <option value="Home & Garden">Home & Garden</option>
                <option value="Sports">Sports</option>
                <option value="Beauty">Beauty</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="productSupplier">Primary Supplier</label>
              <select class="form-control" id="productSupplier">
                <option value="">Select supplier</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="productDescription">Description</label>
            <textarea class="form-control" id="productDescription" rows="3" placeholder="Product description..."></textarea>
          </div>

          <div class="form-section-title">Pricing</div>

          <div class="form-row">
            <div class="form-group">
              <label for="productSellingPrice">Selling Price USD</label>
              <input type="number" class="form-control" id="productSellingPrice" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="form-group">
              <label for="productCostPrice">Cost Price USD</label>
              <input type="number" class="form-control" id="productCostPrice" step="0.01" min="0" placeholder="0.00">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="productShipping">Additional Costs - Shipping Estimate</label>
              <input type="number" class="form-control" id="productShipping" step="0.01" min="0" value="0" placeholder="0.00">
            </div>
            <div class="form-group">
              <label for="productDuties">Additional Costs - Duties Estimate</label>
              <input type="number" class="form-control" id="productDuties" step="0.01" min="0" value="0" placeholder="0.00">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Landed Cost</label>
              <div class="form-computed" id="computedLandedCost">$0.00</div>
            </div>
            <div class="form-group">
              <label>Margin %</label>
              <div class="form-computed" id="computedMargin">0.0%</div>
            </div>
          </div>

          <div class="form-section-title">Inventory</div>

          <div class="form-row">
            <div class="form-group">
              <label for="productStock">Stock Quantity</label>
              <input type="number" class="form-control" id="productStock" min="0" value="0" placeholder="0">
            </div>
            <div class="form-group">
              <label for="productReorderPoint">Reorder Point</label>
              <input type="number" class="form-control" id="productReorderPoint" min="0" value="10" placeholder="10">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="productReorderQty">Reorder Quantity</label>
              <input type="number" class="form-control" id="productReorderQty" min="0" value="50" placeholder="50">
            </div>
            <div class="form-group">
              <label for="productAvgDailySales">Avg Daily Sales</label>
              <input type="number" class="form-control" id="productAvgDailySales" min="0" step="0.1" value="1" placeholder="1">
            </div>
          </div>

          <div class="form-group">
            <label for="productNotes">Notes</label>
            <textarea class="form-control" id="productNotes" rows="3" placeholder="Additional notes..."></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modalCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="modalSaveBtn">Save Product</button>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let allProducts = [];
    let allSuppliers = [];

    // ---- INIT ----
    async function init() {
      currentUser = await requireAuth();
      if (!currentUser) return;

      renderLayout('products');
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'block';

      await loadSuppliers();
      await loadProducts();

      setupEventListeners();

      // Auto-open modal if ?action=add
      const params = new URLSearchParams(window.location.search);
      if (params.get('action') === 'add') {
        openModal();
      }
    }

    // ---- LOAD SUPPLIERS (for dropdowns) ----
    async function loadSuppliers() {
      const { data, error } = await window._supabase
        .from('suppliers')
        .select('id, company_name')
        .eq('user_id', currentUser.id)
        .order('company_name', { ascending: true });

      if (error) {
        console.error('Error loading suppliers:', error);
        return;
      }

      allSuppliers = data || [];

      // Populate filter dropdown
      const filterSelect = document.getElementById('filterSupplier');
      allSuppliers.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.company_name;
        filterSelect.appendChild(opt);
      });

      // Populate modal dropdown
      const modalSelect = document.getElementById('productSupplier');
      allSuppliers.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.company_name;
        modalSelect.appendChild(opt);
      });
    }

    // ---- LOAD PRODUCTS ----
    async function loadProducts() {
      const { data, error } = await window._supabase
        .from('products')
        .select('*, suppliers(company_name)')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('Error loading products:', error);
        showToast('Failed to load products', 'error');
        return;
      }

      allProducts = data || [];
      updateStats();
      renderTable();
    }

    // ---- UPDATE STATS ----
    function updateStats() {
      const total = allProducts.length;
      const lowStock = allProducts.filter(p => p.stock_quantity > 0 && p.stock_quantity <= (p.reorder_point || 0)).length;
      const outOfStock = allProducts.filter(p => p.stock_quantity === 0).length;

      const marginsArr = allProducts.filter(p => p.margin_percent != null).map(p => Number(p.margin_percent));
      const avgMargin = marginsArr.length > 0 ? (marginsArr.reduce((a, b) => a + b, 0) / marginsArr.length) : 0;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statTotalSub').textContent = total === 0 ? 'No products yet' : total + ' product' + (total !== 1 ? 's' : '') + ' in catalog';

      document.getElementById('statLow').textContent = lowStock;
      document.getElementById('statLowSub').textContent = lowStock === 0 ? 'All stock levels healthy' : lowStock + ' item' + (lowStock !== 1 ? 's' : '') + ' need reorder';
      document.getElementById('statLowSub').className = lowStock > 0 ? 'stat-sub down' : 'stat-sub up';

      document.getElementById('statOut').textContent = outOfStock;
      document.getElementById('statOutSub').textContent = outOfStock === 0 ? 'No items out of stock' : outOfStock + ' item' + (outOfStock !== 1 ? 's' : '') + ' unavailable';
      document.getElementById('statOutSub').className = outOfStock > 0 ? 'stat-sub down' : 'stat-sub up';

      document.getElementById('statMargin').textContent = avgMargin.toFixed(1) + '%';
      document.getElementById('statMarginSub').className = avgMargin >= 30 ? 'stat-sub up' : avgMargin >= 15 ? 'stat-sub' : 'stat-sub down';
      document.getElementById('statMarginSub').textContent = 'Average product margin';
    }

    // ---- FILTER PRODUCTS ----
    function getFilteredProducts() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const category = document.getElementById('filterCategory').value;
      const supplier = document.getElementById('filterSupplier').value;
      const stock = document.getElementById('filterStock').value;

      return allProducts.filter(p => {
        // Search filter
        if (search) {
          const name = (p.name || '').toLowerCase();
          const sku = (p.sku || '').toLowerCase();
          const desc = (p.description || '').toLowerCase();
          if (!name.includes(search) && !sku.includes(search) && !desc.includes(search)) return false;
        }

        // Category filter
        if (category && p.category !== category) return false;

        // Supplier filter
        if (supplier && p.primary_supplier_id !== supplier) return false;

        // Stock status filter
        if (stock === 'in_stock' && (p.stock_quantity <= (p.reorder_point || 0))) return false;
        if (stock === 'low_stock' && !(p.stock_quantity > 0 && p.stock_quantity <= (p.reorder_point || 0))) return false;
        if (stock === 'out_of_stock' && p.stock_quantity !== 0) return false;

        return true;
      });
    }

    // ---- RENDER TABLE ----
    function renderTable() {
      const wrap = document.getElementById('productsTableWrap');
      const filtered = getFilteredProducts();

      if (filtered.length === 0) {
        wrap.innerHTML = `
          <div class="empty-state">
            <p>${allProducts.length === 0 ? 'No products yet' : 'No products match your filters'}</p>
            <small>${allProducts.length === 0 ? 'Click "Add Product" to get started' : 'Try adjusting your search or filter criteria'}</small>
          </div>
        `;
        return;
      }

      const iconColors = [
        '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#00d4aa',
        '#ef4444', '#06b6d4', '#84cc16', '#f97316', '#6366f1'
      ];

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Product Name</th>
              <th>SKU</th>
              <th>Category</th>
              <th>Primary Supplier</th>
              <th>Cost Price</th>
              <th>Selling Price</th>
              <th>Margin %</th>
              <th>Stock Qty</th>
              <th>Reorder Pt</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.map(p => {
              const name = escapeHtml(p.name || 'Untitled');
              const firstLetter = (p.name || 'U').charAt(0).toUpperCase();
              const colorIdx = firstLetter.charCodeAt(0) % iconColors.length;
              const iconColor = iconColors[colorIdx];

              const supplierName = p.suppliers ? escapeHtml(p.suppliers.company_name) : '—';
              const margin = p.margin_percent != null ? Number(p.margin_percent) : null;
              let marginClass = 'margin-red';
              if (margin !== null) {
                if (margin > 40) marginClass = 'margin-green';
                else if (margin >= 20) marginClass = 'margin-yellow';
              }
              const marginText = margin !== null ? margin.toFixed(1) + '%' : '—';

              const stockQty = p.stock_quantity != null ? p.stock_quantity : 0;
              const reorderPoint = p.reorder_point != null ? p.reorder_point : 0;
              let stockBadge = '';
              if (stockQty === 0) {
                stockBadge = '<span class="stock-warning stock-out">Out</span>';
              } else if (stockQty <= reorderPoint) {
                stockBadge = '<span class="stock-warning">Low</span>';
              }

              return `
                <tr>
                  <td>
                    <div class="product-cell">
                      <div class="product-icon" style="background:${iconColor}20;color:${iconColor}">${firstLetter}</div>
                      <span class="cell-primary">${name}</span>
                    </div>
                  </td>
                  <td>${escapeHtml(p.sku || '—')}</td>
                  <td>${escapeHtml(p.category || '—')}</td>
                  <td>${supplierName}</td>
                  <td>${formatCurrency(p.cost_price)}</td>
                  <td>${formatCurrency(p.selling_price)}</td>
                  <td><span class="${marginClass}">${marginText}</span></td>
                  <td>${stockQty}${stockBadge}</td>
                  <td>${reorderPoint}</td>
                  <td>
                    <div class="actions-cell">
                      <button class="btn-icon" onclick="editProduct('${p.id}')" title="Edit">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      </button>
                      <button class="btn-icon danger" onclick="deleteProduct('${p.id}')" title="Delete">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                      </button>
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    // ---- MODAL: OPEN ----
    function openModal(product) {
      const modal = document.getElementById('productModal');
      const title = document.getElementById('modalTitle');
      const form = document.getElementById('productForm');

      form.reset();
      document.getElementById('productId').value = '';
      document.getElementById('productShipping').value = '0';
      document.getElementById('productDuties').value = '0';
      document.getElementById('productReorderPoint').value = '10';
      document.getElementById('productReorderQty').value = '50';
      document.getElementById('productAvgDailySales').value = '1';
      document.getElementById('productStock').value = '0';
      document.getElementById('computedLandedCost').textContent = '$0.00';
      document.getElementById('computedMargin').textContent = '0.0%';

      if (product) {
        title.textContent = 'Edit Product';
        document.getElementById('productId').value = product.id;
        document.getElementById('productName').value = product.name || '';
        document.getElementById('productSku').value = product.sku || '';
        document.getElementById('productCategory').value = product.category || '';
        document.getElementById('productDescription').value = product.description || '';
        document.getElementById('productSellingPrice').value = product.selling_price != null ? product.selling_price : '';
        document.getElementById('productCostPrice').value = product.cost_price != null ? product.cost_price : '';
        document.getElementById('productShipping').value = product.shipping_cost_estimate != null ? product.shipping_cost_estimate : 0;
        document.getElementById('productDuties').value = product.duties_estimate != null ? product.duties_estimate : 0;
        document.getElementById('productStock').value = product.stock_quantity != null ? product.stock_quantity : 0;
        document.getElementById('productReorderPoint').value = product.reorder_point != null ? product.reorder_point : 10;
        document.getElementById('productReorderQty').value = product.reorder_quantity != null ? product.reorder_quantity : 50;
        document.getElementById('productAvgDailySales').value = product.avg_daily_sales != null ? product.avg_daily_sales : 1;
        document.getElementById('productSupplier').value = product.primary_supplier_id || '';
        document.getElementById('productNotes').value = product.notes || '';
        updateComputedFields();
      } else {
        title.textContent = 'Add Product';
      }

      modal.classList.add('show');
    }

    // ---- MODAL: CLOSE ----
    function closeModal() {
      document.getElementById('productModal').classList.remove('show');
    }

    // ---- COMPUTED FIELDS (live update) ----
    function updateComputedFields() {
      const cost = parseFloat(document.getElementById('productCostPrice').value) || 0;
      const shipping = parseFloat(document.getElementById('productShipping').value) || 0;
      const duties = parseFloat(document.getElementById('productDuties').value) || 0;
      const selling = parseFloat(document.getElementById('productSellingPrice').value) || 0;

      const landed = cost + shipping + duties;
      const margin = selling > 0 ? ((selling - landed) / selling * 100) : 0;

      document.getElementById('computedLandedCost').textContent = formatCurrency(landed);

      const marginEl = document.getElementById('computedMargin');
      marginEl.textContent = margin.toFixed(1) + '%';

      // Color the margin display
      if (margin > 40) {
        marginEl.style.color = '#00d4aa';
        marginEl.style.borderColor = 'rgba(0,212,170,.2)';
        marginEl.style.background = 'rgba(0,212,170,.06)';
      } else if (margin >= 20) {
        marginEl.style.color = '#f59e0b';
        marginEl.style.borderColor = 'rgba(245,158,11,.2)';
        marginEl.style.background = 'rgba(245,158,11,.06)';
      } else {
        marginEl.style.color = '#ff4757';
        marginEl.style.borderColor = 'rgba(255,71,87,.2)';
        marginEl.style.background = 'rgba(255,71,87,.06)';
      }
    }

    // ---- SAVE PRODUCT ----
    async function saveProduct() {
      const id = document.getElementById('productId').value;
      const productName = document.getElementById('productName').value.trim();

      if (!productName) {
        showToast('Product name is required', 'error');
        return;
      }

      const cost = parseFloat(document.getElementById('productCostPrice').value) || 0;
      const shipping = parseFloat(document.getElementById('productShipping').value) || 0;
      const duties = parseFloat(document.getElementById('productDuties').value) || 0;
      const selling = parseFloat(document.getElementById('productSellingPrice').value) || 0;
      const landedCost = cost + shipping + duties;
      const marginPercent = selling > 0 ? ((selling - landedCost) / selling * 100) : 0;

      const supplierVal = document.getElementById('productSupplier').value;

      const record = {
        user_id: currentUser.id,
        name: productName,
        sku: document.getElementById('productSku').value.trim() || null,
        category: document.getElementById('productCategory').value || null,
        description: document.getElementById('productDescription').value.trim() || null,
        selling_price: selling,
        cost_price: cost,
        shipping_cost_estimate: shipping,
        duties_estimate: duties,
        landed_cost: landedCost,
        margin_percent: parseFloat(marginPercent.toFixed(2)),
        stock_quantity: parseInt(document.getElementById('productStock').value) || 0,
        reorder_point: parseInt(document.getElementById('productReorderPoint').value) || 10,
        reorder_quantity: parseInt(document.getElementById('productReorderQty').value) || 50,
        avg_daily_sales: parseFloat(document.getElementById('productAvgDailySales').value) || 1,
        primary_supplier_id: supplierVal || null,
        notes: document.getElementById('productNotes').value.trim() || null,
      };

      let result;

      if (id) {
        // Update
        result = await window._supabase
          .from('products')
          .update(record)
          .eq('id', id)
          .eq('user_id', currentUser.id)
          .select('*, suppliers(company_name)');
      } else {
        // Insert
        result = await window._supabase
          .from('products')
          .insert(record)
          .select('*, suppliers(company_name)');
      }

      if (result.error) {
        console.error('Save error:', result.error);
        showToast('Failed to save product: ' + result.error.message, 'error');
        return;
      }

      showToast(id ? 'Product updated successfully' : 'Product added successfully', 'success');
      closeModal();
      await loadProducts();
    }

    // ---- EDIT PRODUCT ----
    function editProduct(productId) {
      const product = allProducts.find(p => p.id === productId);
      if (!product) return;
      openModal(product);
    }

    // ---- DELETE PRODUCT ----
    async function deleteProduct(productId) {
      if (!confirm('Are you sure you want to delete this product? This action cannot be undone.')) return;

      const { error } = await window._supabase
        .from('products')
        .delete()
        .eq('id', productId)
        .eq('user_id', currentUser.id);

      if (error) {
        console.error('Delete error:', error);
        showToast('Failed to delete product: ' + error.message, 'error');
        return;
      }

      showToast('Product deleted', 'success');
      await loadProducts();
    }

    // ---- EVENT LISTENERS ----
    function setupEventListeners() {
      // Add product button
      document.getElementById('addProductBtn').addEventListener('click', () => openModal());

      // Modal close
      document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
      document.getElementById('modalCancelBtn').addEventListener('click', closeModal);

      // Click outside modal to close
      document.getElementById('productModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('productModal')) closeModal();
      });

      // Save
      document.getElementById('modalSaveBtn').addEventListener('click', saveProduct);

      // Live computation on price fields
      const priceFields = ['productCostPrice', 'productShipping', 'productDuties', 'productSellingPrice'];
      priceFields.forEach(fieldId => {
        document.getElementById(fieldId).addEventListener('input', updateComputedFields);
      });

      // Filters
      document.getElementById('searchInput').addEventListener('input', renderTable);
      document.getElementById('filterCategory').addEventListener('change', renderTable);
      document.getElementById('filterSupplier').addEventListener('change', renderTable);
      document.getElementById('filterStock').addEventListener('change', renderTable);

      // Enter key on form saves
      document.getElementById('productForm').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
          e.preventDefault();
          saveProduct();
        }
      });
    }

    // ---- START ----
    init();
  </script>
</body>
</html>
